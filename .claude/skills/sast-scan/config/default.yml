version: 1

default_profile: standard

targets:
  include:
    - src
    - app
    - packages
    - lib
  exclude:
    - node_modules
    - vendor
    - dist
    - build
    - .git
    - .venv
    - __pycache__
    - .tox
    - .mypy_cache
    - .pytest_cache
    - .next
    - .nuxt
    - .turbo
    - .cache
    - .gomodcache
    - coverage
    - .ruff_cache
    - .parcel-cache
    - skills

profiles:
  quick:
    changed_only: true
    tools:
      semgrep: true
      gitleaks: true
      codeql: false
      checkov: false
    fail_on: critical

  standard:
    changed_only: false
    tools:
      semgrep: true
      gitleaks: true
      codeql: false
      checkov: true
    fail_on: high

  deep:
    changed_only: false
    tools:
      semgrep: true
      gitleaks: true
      codeql: true
      checkov: true
    fail_on: medium

severity_mapping:
  block:
    - critical
    - high
  warn:
    - medium
  info:
    - low
    - info

report:
  formats:
    - markdown
    - json
    - sarif
  output_dir: .claude/sast/results

fast_filters:
  generated_code: true
  test_code: true

baseline:
  enabled: true
  file: .claude/sast/baseline.json

history:
  enabled: true
  retention_days: 90

gate:
  review_findings_blocking: false
  trend:
    enabled: false
    max_new_high: 0
    max_regression_pct: 10

rules:
  semgrep:
    - auto
    - .claude/skills/sast-scan/rules/semgrep
  codeql:
    - security-extended
    - security-and-quality

tools:
  semgrep:
    timeout: 300
    max_target_size_mb: 50
  gitleaks:
    timeout: 120
  checkov:
    timeout: 300
  codeql:
    timeout: 600
    query_suite: security-extended
    enable_cache: true
    cache_dir: .claude/sast/codeql-cache
    allow_package_manager_builds: true
    allow_repo_build_commands: false

archetype_detection:
  enabled: true

llm_orchestration:
  enabled: true
  max_targets: 20
  max_discover_targets: 25
  context_lines: 15
  max_file_lines: 200
  discover_types:
    csrf:
      enabled: true
      priority: medium
    rate_limiting:
      enabled: true
      priority: medium
    mass_assignment:
      enabled: true
      priority: high
    security_headers:
      enabled: true
      priority: medium
    config_security:
      enabled: true
      priority: high
    global_sweep:
      enabled: true
      priority: high
  archetype_strategies:
    web-app:
      elevate_patterns:
        - exec.Command
        - "eval("
        - innerHTML
      suppress_patterns: []
    cli-tool:
      suppress_patterns:
        - exec.Command
        - os.Getenv
      elevate_patterns:
        - SQL injection
        - path traversal
    library:
      suppress_patterns:
        - exec.Command
      elevate_patterns:
        - crypto
        - hash
        - password
    serverless:
      elevate_patterns:
        - exec.Command
        - "eval("
      suppress_patterns: []

llm_findings:
  import_file: null
