version: 1

default_profile: standard

targets:
  include:
    - src
    - app
    - packages
    - lib
  exclude:
    - node_modules
    - vendor
    - dist
    - build
    - .git
    - .venv
    - __pycache__
    - .tox
    - .mypy_cache
    - .pytest_cache

profiles:
  quick:
    changed_only: true
    tools:
      semgrep: true
      gitleaks: true
      codeql: false
      checkov: false
    fail_on: critical

  standard:
    changed_only: false
    tools:
      semgrep: true
      gitleaks: true
      codeql: false
      checkov: true
    fail_on: high

  deep:
    changed_only: false
    tools:
      semgrep: true
      gitleaks: true
      codeql: true
      checkov: true
    fail_on: medium

severity_mapping:
  block:
    - critical
    - high
  warn:
    - medium
  info:
    - low
    - info

report:
  formats:
    - markdown
    - json
    - sarif
  output_dir: .claude/sast/results

finding_filters:
  test_code:
    enabled: true
    severity_reduction: one_level
  generated_code:
    enabled: true
    action: suppress
  reachability:
    enabled: false

baseline:
  enabled: true
  file: .claude/sast/baseline.json

history:
  enabled: true
  retention_days: 90

gate:
  trend:
    enabled: false
    max_new_high: 0
    max_regression_pct: 10

rules:
  semgrep:
    - auto
    - .claude/skills/sast-scan/rules/semgrep
  codeql:
    - security-extended
    - security-and-quality

tools:
  semgrep:
    timeout: 300
    max_target_size_mb: 50
  gitleaks:
    timeout: 120
  checkov:
    timeout: 300
  codeql:
    timeout: 600
    query_suite: security-extended
    enable_cache: true
    cache_dir: .claude/sast/codeql-cache
