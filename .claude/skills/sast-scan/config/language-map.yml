languages:
  javascript:
    extensions:
      - .js
      - .mjs
      - .cjs
    manifests:
      - package.json
    frameworks:
      express:
        files: ["package.json"]
        dependencies: ["express"]
      react:
        files: ["package.json"]
        dependencies: ["react"]
      next:
        files: ["package.json"]
        dependencies: ["next"]
      vue:
        files: ["package.json"]
        dependencies: ["vue"]
    tools:
      - semgrep
    native_tools:
      - eslint-plugin-security

  typescript:
    extensions:
      - .ts
      - .tsx
      - .mts
      - .cts
    manifests:
      - tsconfig.json
      - package.json
    frameworks:
      nest:
        files: ["package.json"]
        dependencies: ["@nestjs/core"]
    tools:
      - semgrep
    native_tools:
      - eslint-plugin-security

  python:
    extensions:
      - .py
      - .pyi
    manifests:
      - pyproject.toml
      - requirements.txt
      - Pipfile
      - setup.py
      - setup.cfg
    frameworks:
      django:
        files: ["settings.py", "manage.py"]
        dependencies: ["django"]
      flask:
        files: ["requirements.txt", "Pipfile", "pyproject.toml"]
        dependencies: ["flask"]
      fastapi:
        files: ["requirements.txt", "Pipfile", "pyproject.toml"]
        dependencies: ["fastapi"]
    tools:
      - semgrep
    native_tools:
      - bandit

  java:
    extensions:
      - .java
    manifests:
      - pom.xml
      - build.gradle
      - build.gradle.kts
      - settings.gradle
    frameworks:
      spring:
        files: ["pom.xml", "build.gradle"]
        dependencies: ["spring-boot"]
    tools:
      - semgrep
    native_tools:
      - spotbugs

  kotlin:
    extensions:
      - .kt
      - .kts
    manifests:
      - build.gradle.kts
      - pom.xml
    tools:
      - semgrep

  go:
    extensions:
      - .go
    manifests:
      - go.mod
      - go.sum
    tools:
      - semgrep
    native_tools:
      - gosec

  csharp:
    extensions:
      - .cs
    manifests:
      - .csproj
      - .sln
    tools:
      - semgrep

  cpp:
    extensions:
      - .c
      - .cpp
      - .cc
      - .cxx
      - .h
      - .hpp
    manifests:
      - CMakeLists.txt
      - Makefile
      - compile_commands.json
    tools:
      - semgrep
    native_tools:
      - cppcheck

  ruby:
    extensions:
      - .rb
    manifests:
      - Gemfile
      - Gemfile.lock
    frameworks:
      rails:
        files: ["Gemfile"]
        dependencies: ["rails"]
    tools:
      - semgrep
    native_tools:
      - brakeman

  php:
    extensions:
      - .php
    manifests:
      - composer.json
      - composer.lock
    frameworks:
      laravel:
        files: ["composer.json"]
        dependencies: ["laravel/framework"]
    tools:
      - semgrep
    native_tools:
      - phpstan

  rust:
    extensions:
      - .rs
    manifests:
      - Cargo.toml
      - Cargo.lock
    tools:
      - semgrep
    native_tools:
      - cargo-audit

  swift:
    extensions:
      - .swift
    manifests:
      - Package.swift
    tools:
      - semgrep
    native_tools:
      - swiftlint

  terraform:
    extensions:
      - .tf
      - .tf.json
    manifests: []
    tools:
      - semgrep
      - checkov

  cloudformation:
    extensions:
      - .yaml
      - .yml
    manifests: []
    tools:
      - checkov
    detect_by_content: true

  kubernetes:
    extensions:
      - .yaml
      - .yml
    manifests: []
    tools:
      - checkov
    detect_by_content: true

severity_levels:
  critical: 4
  high: 3
  medium: 2
  low: 1
  info: 0
  note: 0
  warning: 2
  error: 3

