  - id: java.security.taint-xss-servlet
    languages: [java]
    severity: ERROR
    message: "Untrusted request data is written to the HTTP response without encoding. Encode output with an HTML encoder."
    metadata:
      category: security
      cwe:
        - "CWE-79"
      owasp:
        - "A03:2021-Injection"
      confidence: MEDIUM
      technology: [java]
    mode: taint
    pattern-sources:
      - pattern: (HttpServletRequest $R).getParameter(...)
      - pattern: (HttpServletRequest $R).getParameterValues(...)
      - pattern: (HttpServletRequest $R).getHeader(...)
      - pattern: (HttpServletRequest $R).getHeaders(...)
      - pattern: (HttpServletRequest $R).getQueryString()
      - pattern: (HttpServletRequest $R).getCookies()
      - pattern: (HttpServletRequest $R).getInputStream()
    pattern-sanitizers:
      - pattern: org.owasp.esapi.ESAPI.encoder().$F(...)
      - pattern: org.owasp.encoder.Encode.$F(...)
      - pattern: org.springframework.web.util.HtmlUtils.htmlEscape(...)
      - pattern: Integer.parseInt(...)
      - pattern: Integer.valueOf(...)
      - pattern: Long.parseLong(...)
      - pattern: Double.parseDouble(...)
    pattern-propagators:
      - pattern: $C.add($X)
        from: $X
        to: $C
      - pattern: $SB.append($X)
        from: $X
        to: $SB
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: $RESP.getWriter().println($X)
              - pattern: $RESP.getWriter().print($X)
              - pattern: $RESP.getWriter().write($X, ...)
              - pattern: $RESP.getWriter().format(..., $X, ...)
              - pattern: (PrintWriter $W).println($X)
              - pattern: (PrintWriter $W).print($X)
              - pattern: (PrintWriter $W).write($X, ...)
              - pattern: (PrintWriter $W).format(..., $X, ...)
              - pattern: (java.io.PrintWriter $W).println($X)
              - pattern: (java.io.PrintWriter $W).print($X)
              - pattern: (java.io.PrintWriter $W).write($X, ...)
              - pattern: (java.io.PrintWriter $W).format(..., $X, ...)
          - focus-metavariable: $X

  - id: java.security.taint-trust-boundary
    languages: [java]
    severity: WARNING
    message: "Untrusted request data is stored in the HTTP session without validation, crossing a trust boundary."
    metadata:
      category: security
      cwe:
        - "CWE-501"
      owasp:
        - "A04:2021-Insecure Design"
      confidence: MEDIUM
      technology: [java]
    mode: taint
    pattern-sources:
      - pattern: (HttpServletRequest $R).getParameter(...)
      - pattern: (HttpServletRequest $R).getParameterValues(...)
      - pattern: (HttpServletRequest $R).getHeader(...)
      - pattern: (HttpServletRequest $R).getHeaders(...)
      - pattern: (HttpServletRequest $R).getQueryString()
      - pattern: (HttpServletRequest $R).getCookies()
      - pattern: (HttpServletRequest $R).getInputStream()
    pattern-sanitizers:
      - pattern: org.owasp.esapi.ESAPI.encoder().$F(...)
      - pattern: org.owasp.encoder.Encode.$F(...)
      - pattern: org.springframework.web.util.HtmlUtils.htmlEscape(...)
      - pattern: Integer.parseInt(...)
      - pattern: Integer.valueOf(...)
      - pattern: Long.parseLong(...)
      - pattern: Double.parseDouble(...)
    pattern-propagators:
      - pattern: $C.add($X)
        from: $X
        to: $C
      - pattern: $SB.append($X)
        from: $X
        to: $SB
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: (HttpSession $S).setAttribute($K, $V)
              - pattern: $REQ.getSession().setAttribute($K, $V)
              - pattern: $REQ.getSession(...).setAttribute($K, $V)
          - focus-metavariable: $V
      - patterns:
          - pattern-either:
              - pattern: (HttpSession $S).setAttribute($K, $V)
              - pattern: $REQ.getSession().setAttribute($K, $V)
              - pattern: $REQ.getSession(...).setAttribute($K, $V)
          - focus-metavariable: $K

  - id: java.security.weak-cipher-algorithm
    languages: [java]
    severity: ERROR
    message: "Weak or ECB-mode cipher algorithm. Use AES/GCM/NoPadding or another authenticated mode."
    metadata:
      category: security
      cwe:
        - "CWE-327"
      owasp:
        - "A02:2021-Cryptographic Failures"
      confidence: HIGH
      technology: [java]
    patterns:
      - pattern-either:
          - pattern: javax.crypto.Cipher.getInstance($ALG, ...)
          - pattern: Cipher.getInstance($ALG, ...)
      - metavariable-regex:
          metavariable: $ALG
          regex: '"(DES|DESede|RC2|RC4|Blowfish)(/.*)?"|".*/ECB/.*"'

  - id: java.security.insecure-cookie
    languages: [java]
    severity: WARNING
    message: "Cookie added to the response without the Secure flag. Call setSecure(true) before addCookie."
    metadata:
      category: security
      cwe:
        - "CWE-614"
      owasp:
        - "A05:2021-Security Misconfiguration"
      confidence: MEDIUM
      technology: [java]
    patterns:
      - pattern: $RESP.addCookie($C);
      - pattern-not-inside: |
          $C.setSecure(true);
          ...
