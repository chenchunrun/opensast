# Java taint-mode rules: track untrusted servlet input through variable
# indirection into dangerous sinks. These complement the syntactic rules in
# rules.yml, which only match the vulnerable call written inline.
#
# Known limit (accepted FN on OWASP Benchmark): cross-file / cross-method helpers
# where tainted data is passed through a utility that Semgrep does not model as
# a propagator. Do not overfit Benchmark fixtures for those cases — document and
# rely on Skill Layer 2/3 for business-logic gaps.

rules:
  - id: java.security.taint-sql-injection
    languages: [java]
    severity: ERROR
    message: "Untrusted request data flows into a SQL query. Use PreparedStatement parameters instead of string concatenation."
    metadata:
      category: security
      cwe:
        - "CWE-89"
      owasp:
        - "A03:2021-Injection"
      confidence: MEDIUM
      technology: [java]
    mode: taint
    pattern-sources: &servlet_sources
      - pattern: (HttpServletRequest $R).getParameter(...)
      - pattern: (HttpServletRequest $R).getParameterValues(...)
      - pattern: (HttpServletRequest $R).getHeader(...)
      - pattern: (HttpServletRequest $R).getHeaders(...)
      - pattern: (HttpServletRequest $R).getQueryString()
      - pattern: (HttpServletRequest $R).getCookies()
      - pattern: (HttpServletRequest $R).getInputStream()
    pattern-sanitizers: &servlet_sanitizers
      - pattern: org.owasp.esapi.ESAPI.encoder().$F(...)
      - pattern: org.owasp.encoder.Encode.$F(...)
      - pattern: org.springframework.web.util.HtmlUtils.htmlEscape(...)
      - pattern: Integer.parseInt(...)
      - pattern: Integer.valueOf(...)
      - pattern: Long.parseLong(...)
      - pattern: Double.parseDouble(...)
    pattern-propagators: &collection_propagators
      - pattern: $C.add($X)
        from: $X
        to: $C
      - pattern: $SB.append($X)
        from: $X
        to: $SB
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: $C.prepareCall($SQL, ...)
              - pattern: $C.prepareStatement($SQL, ...)
              - pattern: $S.executeQuery($SQL)
              - pattern: $S.executeUpdate($SQL, ...)
              - pattern: $S.execute($SQL, ...)
              - pattern: $S.addBatch($SQL)
              - pattern: $JT.queryForObject($SQL, ...)
              - pattern: $JT.query($SQL, ...)
              - pattern: $JT.update($SQL, ...)
              - pattern: $JT.batchUpdate($SQL, ...)
          - focus-metavariable: $SQL

  - id: java.security.taint-command-injection
    languages: [java]
    severity: ERROR
    message: "Untrusted request data flows into an OS command. Use a fixed command with validated arguments."
    metadata:
      category: security
      cwe:
        - "CWE-78"
      owasp:
        - "A03:2021-Injection"
      confidence: MEDIUM
      technology: [java]
    mode: taint
    pattern-sources:
      - pattern: (HttpServletRequest $R).getParameter(...)
      - pattern: (HttpServletRequest $R).getParameterValues(...)
      - pattern: (HttpServletRequest $R).getHeader(...)
      - pattern: (HttpServletRequest $R).getHeaders(...)
      - pattern: (HttpServletRequest $R).getQueryString()
      - pattern: (HttpServletRequest $R).getCookies()
      - pattern: (HttpServletRequest $R).getInputStream()
    pattern-sanitizers:
      - pattern: org.owasp.esapi.ESAPI.encoder().$F(...)
      - pattern: org.owasp.encoder.Encode.$F(...)
      - pattern: org.springframework.web.util.HtmlUtils.htmlEscape(...)
      - pattern: Integer.parseInt(...)
      - pattern: Integer.valueOf(...)
      - pattern: Long.parseLong(...)
      - pattern: Double.parseDouble(...)
    pattern-propagators:
      - pattern: $C.add($X)
        from: $X
        to: $C
      - pattern: $SB.append($X)
        from: $X
        to: $SB
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: $RT.exec($CMD, ...)
              - pattern: new ProcessBuilder($CMD, ...)
              - pattern: $PB.command($CMD, ...)
          - focus-metavariable: $CMD

  - id: java.security.taint-path-traversal
    languages: [java]
    severity: ERROR
    message: "Untrusted request data flows into a file path. Validate the path against an allowlist or canonicalize and check the prefix."
    metadata:
      category: security
      cwe:
        - "CWE-22"
      owasp:
        - "A01:2021-Broken Access Control"
      confidence: MEDIUM
      technology: [java]
    mode: taint
    pattern-sources:
      - pattern: (HttpServletRequest $R).getParameter(...)
      - pattern: (HttpServletRequest $R).getParameterValues(...)
      - pattern: (HttpServletRequest $R).getHeader(...)
      - pattern: (HttpServletRequest $R).getHeaders(...)
      - pattern: (HttpServletRequest $R).getQueryString()
      - pattern: (HttpServletRequest $R).getCookies()
      - pattern: (HttpServletRequest $R).getInputStream()
    pattern-sanitizers:
      - pattern: org.owasp.esapi.ESAPI.encoder().$F(...)
      - pattern: org.owasp.encoder.Encode.$F(...)
      - pattern: org.springframework.web.util.HtmlUtils.htmlEscape(...)
      - pattern: Integer.parseInt(...)
      - pattern: Integer.valueOf(...)
      - pattern: Long.parseLong(...)
      - pattern: Double.parseDouble(...)
    pattern-propagators:
      - pattern: $C.add($X)
        from: $X
        to: $C
      - pattern: $SB.append($X)
        from: $X
        to: $SB
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: new File($P, ...)
              - pattern: new File($D, $P)
              - pattern: new java.io.File($P, ...)
              - pattern: new java.io.File($D, $P)
              - pattern: new FileInputStream($P)
              - pattern: new java.io.FileInputStream($P)
              - pattern: new FileOutputStream($P, ...)
              - pattern: new java.io.FileOutputStream($P, ...)
              - pattern: new FileReader($P)
              - pattern: new java.io.FileReader($P)
              - pattern: new FileWriter($P, ...)
              - pattern: new java.io.FileWriter($P, ...)
              - pattern: Paths.get($P, ...)
          - focus-metavariable: $P

