      owasp:
        - "A03:2021-Injection"
      confidence: MEDIUM
      technology: [java]
    mode: taint
    pattern-sources:
      - pattern: (HttpServletRequest $R).getParameter(...)
      - pattern: (HttpServletRequest $R).getParameterValues(...)
      - pattern: (HttpServletRequest $R).getHeader(...)
      - pattern: (HttpServletRequest $R).getHeaders(...)
      - pattern: (HttpServletRequest $R).getQueryString()
      - pattern: (HttpServletRequest $R).getCookies()
      - pattern: (HttpServletRequest $R).getInputStream()
    pattern-sanitizers:
      - pattern: org.owasp.esapi.ESAPI.encoder().$F(...)
      - pattern: org.owasp.encoder.Encode.$F(...)
      - pattern: org.springframework.web.util.HtmlUtils.htmlEscape(...)
      - pattern: Integer.parseInt(...)
      - pattern: Integer.valueOf(...)
      - pattern: Long.parseLong(...)
      - pattern: Double.parseDouble(...)
    pattern-propagators:
