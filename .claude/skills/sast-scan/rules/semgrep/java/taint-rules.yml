      - pattern: (HttpServletRequest $R).getParameterValues(...)
      - pattern: (HttpServletRequest $R).getHeader(...)
      - pattern: (HttpServletRequest $R).getHeaders(...)
      - pattern: (HttpServletRequest $R).getQueryString()
      - pattern: (HttpServletRequest $R).getCookies()
      - pattern: (HttpServletRequest $R).getInputStream()
