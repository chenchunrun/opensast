# PHP taint-mode rules: track untrusted user input from superglobals
# through variable indirection into dangerous sinks. These complement the
# syntactic rules in rules.yml, which only match the vulnerable call inline.
#
# PHP sources: $_GET, $_POST, $_REQUEST, $_COOKIE, $_FILES, $_SERVER
# Framework sources: Laravel Request::input(), Symfony Request->get()

rules:
  - id: php.security.taint-sql-injection
    languages: [php]
    severity: ERROR
    message: "Untrusted user input flows into a SQL query. Use PDO prepared statements with bound parameters."
    metadata:
      category: security
      cwe: ["CWE-89"]
      owasp: ["A03:2021-Injection"]
      confidence: MEDIUM
      technology: [php]
    mode: taint
    pattern-sources:
      - pattern: $_GET[$KEY]
      - pattern: $_POST[$KEY]
      - pattern: $_REQUEST[$KEY]
      - pattern: $_COOKIE[$KEY]
      - pattern: filter_input(...)
    pattern-sanitizers:
      - pattern: intval(...)
      - pattern: (int) $X
      - pattern: (float) $X
      - pattern: PDO::quote(...)
    pattern-propagators:
      - pattern: $X . $Y
        from: $X
        to: $Y
      - pattern: sprintf($FMT, $X)
        from: $X
        to: $FMT
      - pattern: "$X"
        from: $X
        to: ...
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: mysql_query($SQL)
              - pattern: mysqli_query($CONN, $SQL)
              - pattern: pg_query($CONN, $SQL)
              - pattern: $DB->query($SQL)
              - pattern: $STMT->execute($SQL)
              - pattern: $PDO->exec($SQL)
              - pattern: $PDO->query($SQL)
              - pattern: pg_exec($CONN, $SQL)
          - focus-metavariable: $SQL

  - id: php.security.taint-command-injection
    languages: [php]
    severity: ERROR
    message: "Untrusted user input flows into command execution. Use escapeshellarg() and prefer array-form arguments."
    metadata:
      category: security
      cwe: ["CWE-78"]
      owasp: ["A03:2021-Injection"]
      confidence: MEDIUM
      technology: [php]
    mode: taint
    pattern-sources:
      - pattern: $_GET[$KEY]
      - pattern: $_POST[$KEY]
      - pattern: $_REQUEST[$KEY]
      - pattern: $_COOKIE[$KEY]
    pattern-sanitizers:
      - pattern: escapeshellarg(...)
      - pattern: escapeshellcmd(...)
      - pattern: intval(...)
    pattern-propagators:
      - pattern: $X . $Y
        from: $X
        to: $Y
      - pattern: sprintf($FMT, $X)
        from: $X
        to: $FMT
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: exec($CMD)
              - pattern: system($CMD)
              - pattern: passthru($CMD)
              - pattern: shell_exec($CMD)
              - pattern: popen($CMD, ...)
              - pattern: proc_open($CMD, ...)
          - focus-metavariable: $CMD

  - id: php.security.taint-file-inclusion
    languages: [php]
    severity: ERROR
    message: "Untrusted user input flows into a file inclusion. Validate against an allowlist of permitted files."
    metadata:
      category: security
      cwe: ["CWE-98"]
      owasp: ["A03:2021-Injection"]
      confidence: MEDIUM
      technology: [php]
    mode: taint
    pattern-sources:
      - pattern: $_GET[$KEY]
      - pattern: $_POST[$KEY]
      - pattern: $_REQUEST[$KEY]
      - pattern: $_SERVER[$KEY]
    pattern-sanitizers:
      - pattern: basename(...)
      - pattern: realpath(...)
    pattern-propagators:
      - pattern: $X . $Y
        from: $X
        to: $Y
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: include($PATH)
              - pattern: include_once($PATH)
              - pattern: require($PATH)
              - pattern: require_once($PATH)
              - pattern: fopen($PATH, ...)
              - pattern: file_get_contents($PATH)
              - pattern: file($PATH)
          - focus-metavariable: $PATH

  - id: php.security.taint-path-traversal
    languages: [php]
    severity: ERROR
    message: "Untrusted user input flows into a file path. Validate and restrict to expected directories."
    metadata:
      category: security
      cwe: ["CWE-22"]
      owasp: ["A01:2021-Broken Access Control"]
      confidence: MEDIUM
      technology: [php]
    mode: taint
    pattern-sources:
      - pattern: $_GET[$KEY]
      - pattern: $_POST[$KEY]
      - pattern: $_REQUEST[$KEY]
      - pattern: $_FILES[$KEY]
    pattern-sanitizers:
      - pattern: basename(...)
      - pattern: realpath(...)
      - pattern: pathinfo(..., PATHINFO_BASENAME)
    pattern-propagators:
      - pattern: $X . $Y
        from: $X
        to: $Y
      - pattern: $BASE . "/" . $X
        from: $X
        to: $BASE
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: fopen($PATH, ...)
              - pattern: file_get_contents($PATH)
              - pattern: file_put_contents($PATH, ...)
              - pattern: readfile($PATH)
              - pattern: unlink($PATH)
              - pattern: copy($SRC, $PATH)
              - pattern: move_uploaded_file($SRC, $PATH)
          - focus-metavariable: $PATH

  - id: php.security.taint-xss
    languages: [php]
    severity: ERROR
    message: "Untrusted user input flows into HTML output without escaping. Use htmlspecialchars() or a template engine with auto-escaping."
    metadata:
      category: security
      cwe: ["CWE-79"]
      owasp: ["A03:2021-Injection"]
      confidence: MEDIUM
      technology: [php]
    mode: taint
    pattern-sources:
      - pattern: $_GET[$KEY]
      - pattern: $_POST[$KEY]
      - pattern: $_REQUEST[$KEY]
      - pattern: $_SERVER["HTTP_..."]
    pattern-sanitizers:
      - pattern: htmlspecialchars(...)
      - pattern: htmlentities(...)
      - pattern: strip_tags(...)
      - pattern: filter_var(...)
    pattern-propagators:
      - pattern: $X . $Y
        from: $X
        to: $Y
      - pattern: "$X"
        from: $X
        to: ...
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: print $DATA
              - pattern: printf($FMT, $DATA)
              - pattern: print_r($DATA)
          - focus-metavariable: $DATA

  - id: php.security.taint-deserialize
    languages: [php]
    severity: ERROR
    message: "Untrusted user input flows into deserialization. This can lead to object injection and remote code execution."
    metadata:
      category: security
      cwe: ["CWE-502"]
      owasp: ["A08:2021-Software and Data Integrity Failures"]
      confidence: MEDIUM
      technology: [php]
    mode: taint
    pattern-sources:
      - pattern: $_GET[$KEY]
      - pattern: $_POST[$KEY]
      - pattern: $_REQUEST[$KEY]
      - pattern: $_COOKIE[$KEY]
    pattern-sanitizers:
      - pattern: hash_hmac(..., $X, ...)
    pattern-propagators:
      - pattern: $X . $Y
        from: $X
        to: $Y
      - pattern: base64_decode($X)
        from: $X
        to: ...
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: unserialize($DATA)
              - pattern: unserialize($DATA, ...)
          - focus-metavariable: $DATA
