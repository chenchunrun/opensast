rules:
  - id: python.security.command-injection-subprocess
    languages: [python]
    severity: ERROR
    message: "Avoid shell=True with user-controlled input in subprocess calls"
    metadata:
      category: security
      cwe:
        - "CWE-78"
      owasp:
        - "A03:2021-Injection"
      confidence: HIGH
      technology: [python]
    patterns:
      - pattern: subprocess.run(..., shell=True, ...)
      - pattern-not: subprocess.run("...", shell=True, ...)

  - id: python.security.sql-injection-string-concat
    languages: [python]
    severity: ERROR
    message: "Detected SQL query using string formatting or concatenation. Use parameterized queries instead."
    metadata:
      category: security
      cwe:
        - "CWE-89"
      owasp:
        - "A03:2021-Injection"
      confidence: HIGH
      technology: [python]
    patterns:
      - pattern-either:
          - pattern: |
              $CURSOR.execute(f"...{$VAR}...")
          - pattern: |
              $CURSOR.execute("..." + $VAR + "...")
          - pattern: |
              $CURSOR.execute("..." % $VAR)
          - pattern: |
              $CURSOR.execute("...".format(...))
          - pattern: |
              $CONN.execute(f"...{$VAR}...")
          - pattern: |
              $CONN.execute("..." + $VAR + "...")
          - pattern: |
              $CONN.execute("..." % $VAR)
          - pattern: |
              $CONN.execute("...".format(...))
      - pattern-not: |
          $CURSOR.execute("...", ...)

  - id: python.security.eval-usage
    languages: [python]
    severity: ERROR
    message: "Detected eval() usage with non-literal argument. eval() can execute arbitrary code and is dangerous."
    metadata:
      category: security
      cwe:
        - "CWE-94"
      owasp:
        - "A03:2021-Injection"
      confidence: HIGH
      technology: [python]
    patterns:
      - pattern: eval($VAR)
      - pattern-not: eval("...")

  - id: python.security.pickle-load
    languages: [python]
    severity: ERROR
    message: "Detected pickle.loads() or pickle.load() usage. Pickle deserialization can execute arbitrary code."
    metadata:
      category: security
      cwe:
        - "CWE-502"
      owasp:
        - "A08:2021-Software and Data Integrity Failures"
      confidence: HIGH
      technology: [python]
    pattern-either:
      - pattern: pickle.loads(...)
      - pattern: pickle.load(...)

  - id: python.security.yaml-unsafe-load
    languages: [python]
    severity: ERROR
    message: "Detected yaml.load() without SafeLoader. Use yaml.safe_load() or yaml.load(data, Loader=yaml.SafeLoader) instead."
    metadata:
      category: security
      cwe:
        - "CWE-502"
      owasp:
        - "A08:2021-Software and Data Integrity Failures"
      confidence: HIGH
      technology: [python]
    patterns:
      - pattern: yaml.load(...)
      - pattern-not: yaml.load(..., Loader=yaml.SafeLoader)

  - id: python.security.hardcoded-secret-string
    languages: [python]
    severity: WARNING
    message: "Detected hardcoded secret in string assignment. Use environment variables or a secret manager instead."
    metadata:
      category: security
      cwe:
        - "CWE-798"
      owasp:
        - "A07:2021-Identification and Authentication Failures"
      confidence: MEDIUM
      technology: [python]
    patterns:
      - pattern-either:
          - pattern: |
              $VAR = "...password..."
          - pattern: |
              $VAR = "...secret..."
          - pattern: |
              $VAR = "...api_key..."
          - pattern: |
              $VAR = "...apikey..."
          - pattern: |
              $VAR = "...token..."
      - pattern-not: |
          $VAR = os.environ.get(...)
      - pattern-not: |
          $VAR = os.getenv(...)
