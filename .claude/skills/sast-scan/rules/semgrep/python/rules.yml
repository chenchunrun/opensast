rules:
  - id: python.security.command-injection-subprocess
    languages: [python]
    severity: ERROR
    message: "Avoid shell=True with user-controlled input in subprocess calls"
    metadata:
      category: security
      cwe:
        - "CWE-78"
      owasp:
        - "A03:2021-Injection"
      confidence: HIGH
      technology: [python]
    patterns:
      - pattern-either:
          - pattern: subprocess.run(..., shell=True, ...)
          - pattern: subprocess.call(..., shell=True, ...)
          - pattern: subprocess.Popen(..., shell=True, ...)
      - pattern-not: subprocess.run("...", shell=True, ...)
      - pattern-not: subprocess.call("...", shell=True, ...)

  - id: python.security.sql-injection-string-concat
    languages: [python]
    severity: ERROR
    message: "Detected SQL query using string formatting or concatenation. Use parameterized queries instead."
    metadata:
      category: security
      cwe:
        - "CWE-89"
      owasp:
        - "A03:2021-Injection"
      confidence: HIGH
      technology: [python]
    patterns:
      - pattern-either:
          - pattern: |
              $CURSOR.execute(f"...")
          - pattern: |
              $CURSOR.execute("..." + $VAR)
          - pattern: |
              $CURSOR.execute("..." + $VAR + "...")
          - pattern: |
              $CURSOR.execute("..." % $VAR)
          - pattern: |
              $CURSOR.execute("...".format(...))
          - pattern: |
              $CONN.execute(f"...")
          - pattern: |
              $CONN.execute("..." + $VAR)
          - pattern: |
              $CONN.execute("..." + $VAR + "...")
          - pattern: |
              $CONN.execute("..." % $VAR)
          - pattern: |
              $CONN.execute("...".format(...))
          - pattern-regex: \.execute\(f["']
          - pattern-regex: \.execute\([^)]*"[^"]*"\s*\+
          - pattern-regex: \.execute\([^)]*"[^"]*"\s*%
      - pattern-not: |
          $CURSOR.execute("...", ...)
      - pattern-not: |
          $CURSOR.execute($SQL, $ARGS)
      - pattern-not: |
          $CONN.execute($SQL, $ARGS)

  - id: python.security.eval-usage
    languages: [python]
    severity: ERROR
    message: "Detected eval() usage with non-literal argument. eval() can execute arbitrary code and is dangerous."
    metadata:
      category: security
      cwe:
        - "CWE-94"
      owasp:
        - "A03:2021-Injection"
      confidence: HIGH
      technology: [python]
    patterns:
      - pattern: eval($VAR)
      - pattern-not: eval("...")

  - id: python.security.pickle-load
    languages: [python]
    severity: ERROR
    message: "Detected pickle.loads() or pickle.load() usage. Pickle deserialization can execute arbitrary code."
    metadata:
      category: security
      cwe:
        - "CWE-502"
      owasp:
        - "A08:2021-Software and Data Integrity Failures"
      confidence: HIGH
      technology: [python]
    pattern-either:
      - pattern: pickle.loads(...)
      - pattern: pickle.load(...)

  - id: python.security.yaml-unsafe-load
    languages: [python]
    severity: ERROR
    message: "Detected yaml.load() without SafeLoader. Use yaml.safe_load() or yaml.load(data, Loader=yaml.SafeLoader) instead."
    metadata:
      category: security
      cwe:
        - "CWE-502"
      owasp:
        - "A08:2021-Software and Data Integrity Failures"
      confidence: HIGH
      technology: [python]
    patterns:
      - pattern: yaml.load(...)
      - pattern-not: yaml.load(..., Loader=yaml.SafeLoader)
      - pattern-not: yaml.load(..., Loader=yaml.FullLoader)

  - id: python.security.hardcoded-secret-string
    languages: [python]
    severity: WARNING
    message: "Detected hardcoded secret in string assignment. Use environment variables or a secret manager instead."
    metadata:
      category: security
      cwe:
        - "CWE-798"
      owasp:
        - "A07:2021-Identification and Authentication Failures"
      confidence: MEDIUM
      technology: [python]
    patterns:
      - pattern-regex: (?i)(password|secret|api_key|apikey|token)\s*=\s*["'][^"']+["']
      - pattern-not: |
          $VAR = os.environ.get(...)
      - pattern-not: |
          $VAR = os.getenv(...)

  - id: python.security.ssrf-requests
    languages: [python]
    severity: ERROR
    message: "Detected requests call with user-controlled URL. Validate URLs against an allowlist to prevent SSRF."
    metadata:
      category: security
      cwe:
        - "CWE-918"
      owasp:
        - "A10:2021-Server-Side Request Forgery"
      confidence: MEDIUM
      technology: [python]
    patterns:
      - pattern-either:
          - pattern: requests.get($URL)
          - pattern: requests.post($URL, ...)
          - pattern: requests.put($URL, ...)
          - pattern: requests.delete($URL)
          - pattern: requests.head($URL)
      - pattern-not: requests.get("...")
      - pattern-not: requests.post("...", ...)
      - pattern-not: os.environ.get(...)
      - pattern-not: os.getenv(...)

  - id: python.security.path-traversal
    languages: [python]
    severity: ERROR
    message: "Detected file operation with user-controlled path. Validate and sanitize paths to prevent directory traversal."
    metadata:
      category: security
      cwe:
        - "CWE-22"
      owasp:
        - "A01:2021-Broken Access Control"
      confidence: MEDIUM
      technology: [python]
    patterns:
      - pattern-either:
          - pattern: open($USER_INPUT, ...)
          - pattern: os.path.join($BASE, $USER_INPUT)
          - pattern: pathlib.Path($USER_INPUT)
          - pattern: os.path.join($BASE, $USER_INPUT, ...)
      - pattern-not: open("...", ...)
      - pattern-not: os.path.join("...", "...")
      - pattern-not: pathlib.Path("...")

  - id: python.security.open-redirect
    languages: [python]
    severity: WARNING
    message: "Detected redirect with user-controlled URL. Validate redirect targets against an allowlist."
    metadata:
      category: security
      cwe:
        - "CWE-601"
      owasp:
        - "A01:2021-Broken Access Control"
      confidence: MEDIUM
      technology: [python]
    patterns:
      - pattern-either:
          - pattern: redirect($USER_INPUT)
          - pattern: HttpResponseRedirect($USER_INPUT)
      - pattern-not: redirect("...")
      - pattern-not: HttpResponseRedirect("...")

  - id: python.security.insecure-random
    languages: [python]
    severity: WARNING
    message: "Detected random module used for security purposes. Use secrets module instead."
    metadata:
      category: security
      cwe:
        - "CWE-338"
      owasp:
        - "A02:2021-Cryptographic Failures"
      confidence: MEDIUM
      technology: [python]
    patterns:
      - pattern-either:
          - pattern: random.randint(...)
          - pattern: random.choice(...)
          - pattern: random.random()
          - pattern: random.uniform(...)
      - pattern-not: random.shuffle(...)

  - id: python.security.timing-attack
    languages: [python]
    severity: WARNING
    message: "Detected non-constant-time comparison of secrets. Use hmac.compare_digest() to prevent timing attacks."
    metadata:
      category: security
      cwe:
        - "CWE-208"
      owasp:
        - "A02:2021-Cryptographic Failures"
      confidence: MEDIUM
      technology: [python]
    patterns:
      - pattern-regex: (?i)\b(password|token|secret|api_key|auth)\w*\s*==\s*
      - pattern-not: hmac.compare_digest(...)

  - id: python.security.flask-debug
    languages: [python]
    severity: WARNING
    message: "Flask debug mode enabled. Do not run with debug=True in production."
    metadata:
      category: security
      cwe:
        - "CWE-215"
      owasp:
        - "A05:2021-Security Misconfiguration"
      confidence: HIGH
      technology: [python, flask]
    patterns:
      - pattern: app.run(..., debug=True, ...)

  - id: python.security.django-debug
    languages: [python]
    severity: WARNING
    message: "Django DEBUG mode enabled. Set DEBUG = False in production."
    metadata:
      category: security
      cwe:
        - "CWE-215"
      owasp:
        - "A05:2021-Security Misconfiguration"
      confidence: HIGH
      technology: [python, django]
    patterns:
      - pattern: |
          DEBUG = True

  - id: python.security.csrf-disabled-django
    languages: [python]
    severity: WARNING
    message: "CSRF protection disabled via @csrf_exempt. Remove this decorator unless absolutely necessary."
    metadata:
      category: security
      cwe:
        - "CWE-352"
      owasp:
        - "A01:2021-Broken Access Control"
      confidence: HIGH
      technology: [python, django]
    pattern: "@csrf_exempt"

  - id: python.security.insecure-cookie-django
    languages: [python]
    severity: WARNING
    message: "Django session cookie not marked as secure. Set SESSION_COOKIE_SECURE = True for HTTPS."
    metadata:
      category: security
      cwe:
        - "CWE-614"
      owasp:
        - "A05:2021-Security Misconfiguration"
      confidence: HIGH
      technology: [python, django]
    patterns:
      - pattern: |
          SESSION_COOKIE_SECURE = False

  - id: python.security.weak-hash-md5
    languages: [python]
    severity: WARNING
    message: "Detected MD5 hash usage. MD5 is cryptographically broken. Use hashlib.sha256() or stronger."
    metadata:
      category: security
      cwe:
        - "CWE-328"
      owasp:
        - "A02:2021-Cryptographic Failures"
      confidence: HIGH
      technology: [python]
    patterns:
      - pattern-either:
          - pattern: hashlib.md5(...)
          - pattern: MD5.new(...)

  - id: python.security.weak-hash-sha1
    languages: [python]
    severity: WARNING
    message: "Detected SHA1 hash usage. SHA1 is cryptographically weak. Use hashlib.sha256() or stronger."
    metadata:
      category: security
      cwe:
        - "CWE-328"
      owasp:
        - "A02:2021-Cryptographic Failures"
      confidence: HIGH
      technology: [python]
    patterns:
      - pattern-either:
          - pattern: hashlib.sha1(...)
          - pattern: SHA.new(...)

  - id: python.security.insecure-ssl-no-verify
    languages: [python]
    severity: ERROR
    message: "SSL certificate verification disabled. Remove verify=False to validate TLS certificates."
    metadata:
      category: security
      cwe:
        - "CWE-295"
      owasp:
        - "A02:2021-Cryptographic Failures"
      confidence: HIGH
      technology: [python]
    patterns:
      - pattern: requests.$METHOD(..., verify=False, ...)
      - pattern-not: requests.$METHOD(..., verify=True, ...)

  - id: python.security.template-injection
    languages: [python]
    severity: ERROR
    message: "Detected user input in template string. Use sandboxed templates or autoescape to prevent SSTI."
    metadata:
      category: security
      cwe:
        - "CWE-94"
      owasp:
        - "A03:2021-Injection"
      confidence: MEDIUM
      technology: [python]
    patterns:
      - pattern-either:
          - pattern: |
              Template($USER_INPUT)
          - pattern: |
              Environment(..., autoescape=False)
      - pattern-not: |
          Template("...")

  - id: python.security.nosql-injection
    languages: [python]
    severity: ERROR
    message: "Detected MongoDB $where with potentially unsafe input. Use approved filter patterns instead."
    metadata:
      category: security
      cwe:
        - "CWE-89"
      owasp:
        - "A03:2021-Injection"
      confidence: MEDIUM
      technology: [python, mongodb]
    patterns:
      - pattern: |
          {"$where": $VAR}
      - pattern-not: |
          {"$where": "..."}

  - id: python.security.xml-external-entity
    languages: [python]
    severity: ERROR
    message: "Detected XML parsing without defusedxml. Use defusedxml to prevent XXE attacks."
    metadata:
      category: security
      cwe:
        - "CWE-611"
      owasp:
        - "A05:2021-Security Misconfiguration"
      confidence: HIGH
      technology: [python]
    patterns:
      - pattern-either:
          - pattern: xml.dom.minidom.parseString(...)
          - pattern: xml.etree.ElementTree.parse(...)
          - pattern: xml.sax.parse(...)
      - pattern-not: |
          defusedxml.$PARSER.parse(...)

  - id: python.security.tempfile-insecure
    languages: [python]
    severity: WARNING
    message: "Detected tempfile.mktemp() which is vulnerable to race conditions. Use tempfile.mkstemp() instead."
    metadata:
      category: security
      cwe:
        - "CWE-377"
      owasp:
        - "A04:2021-Insecure Design"
      confidence: HIGH
      technology: [python]
    pattern: tempfile.mktemp(...)

  - id: python.security.logging-sensitive-data
    languages: [python]
    severity: WARNING
    message: "Detected potentially sensitive data passed to logger. Avoid logging passwords, tokens, or personal data."
    metadata:
      category: security
      cwe:
        - "CWE-532"
      owasp:
        - "A09:2021-Security Logging and Monitoring Failures"
      confidence: MEDIUM
      technology: [python]
    patterns:
      - pattern-either:
          - pattern: |
              $LOGGER.info(..., password=..., ...)
          - pattern: |
              $LOGGER.info(..., token=..., ...)
          - pattern: |
              $LOGGER.info(..., secret=..., ...)
          - pattern: |
              $LOGGER.debug(password)
          - pattern: |
              $LOGGER.debug(token)

  - id: python.security.assert-in-production
    languages: [python]
    severity: WARNING
    message: "Detected assert used for security check. Assertions are removed with -O flag. Use explicit if/raise instead."
    metadata:
      category: security
      cwe:
        - "CWE-617"
      owasp:
        - "A05:2021-Security Misconfiguration"
      confidence: MEDIUM
      technology: [python]
    patterns:
      - pattern: |
          assert $COND, ...

  - id: python.security.ldap-injection
    languages: [python]
    severity: ERROR
    message: "Detected LDAP query with string concatenation. Use parameterized LDAP queries to prevent injection."
    metadata:
      category: security
      cwe:
        - "CWE-90"
      owasp:
        - "A03:2021-Injection"
      confidence: MEDIUM
      technology: [python]
    patterns:
      - pattern-either:
          - pattern: |
              $CONN.search_s("..." + $VAR + "...", ...)
          - pattern: |
              $CONN.search("..." + $VAR + "...", ...)
      - pattern-not: |
          $CONN.search_s("...", ...)

  - id: python.security.des-usage
    languages: [python]
    severity: ERROR
    message: "Detected DES cipher usage. DES is insecure and trivially breakable. Use AES with GCM mode instead."
    metadata:
      category: security
      cwe:
        - "CWE-326"
      owasp:
        - "A02:2021-Cryptographic Failures"
      confidence: HIGH
      technology: [python]
    patterns:
      - pattern: DES.new(...)

  - id: python.security.http-only-sensitive-query
    languages: [python]
    severity: WARNING
    message: "Detected sensitive data in URL query parameters. Send credentials in request body or headers instead."
    metadata:
      category: security
      cwe:
        - "CWE-598"
      owasp:
        - "A07:2021-Identification and Authentication Failures"
      confidence: MEDIUM
      technology: [python]
    patterns:
      - pattern-either:
          - pattern: |
              requests.get($URL, params={"password": ...})
          - pattern: |
              requests.get($URL, params={"token": ...})
          - pattern: |
              requests.get($URL, params={"secret": ...})
          - pattern: |
              requests.post($URL, ..., params={"password": ...})

  - id: python.security.exception-broad
    languages: [python]
    severity: INFO
    message: "Detected bare except clause. This can catch and hide security-relevant exceptions. Use specific exception types."
    metadata:
      category: security
      cwe:
        - "CWE-396"
      owasp:
        - "A05:2021-Security Misconfiguration"
      confidence: LOW
      technology: [python]
    patterns:
      - pattern: |
          try:
              ...
          except:
              ...

  - id: python.security.hardcoded-password-django
    languages: [python]
    severity: WARNING
    message: "Detected hardcoded password in Django settings. Use environment variables or a secret manager."
    metadata:
      category: security
      cwe:
        - "CWE-798"
      owasp:
        - "A07:2021-Identification and Authentication Failures"
      confidence: HIGH
      technology: [python, django]
    patterns:
      - pattern-either:
          - pattern: |
              PASSWORD = "..."
          - pattern: |
              SECRET_KEY = "..."
          - pattern: |
              DATABASES = {..., "PASSWORD": "...", ...}
      - pattern-not: |
          PASSWORD = os.environ.get(...)
      - pattern-not: |
          SECRET_KEY = os.environ.get(...)
      - pattern-not: |
          SECRET_KEY = os.getenv(...)

  - id: python.security.flask-secret-key-weak
    languages: [python]
    severity: ERROR
    message: "Detected Flask secret key set to a hardcoded short value. Use a strong random secret from environment variables."
    metadata:
      category: security
      cwe:
        - "CWE-798"
      owasp:
        - "A07:2021-Identification and Authentication Failures"
      confidence: HIGH
      technology: [python, flask]
    patterns:
      - pattern-either:
          - pattern: |
              app.secret_key = "..."
          - pattern: |
              app.config["SECRET_KEY"] = "..."
          - pattern: |
              SECRET_KEY = "..."
      - pattern-not: |
          app.secret_key = os.environ.get(...)
      - pattern-not: |
          app.config["SECRET_KEY"] = os.environ.get(...)
