rules:
  - id: python.security.command-injection-subprocess
    languages: [python]
    severity: ERROR
    message: "Avoid shell=True with user-controlled input in subprocess calls"
    metadata:
      category: security
      cwe:
        - "CWE-78"
      owasp:
        - "A03:2021-Injection"
      confidence: HIGH
      technology: [python]
    patterns:
      - pattern: subprocess.run(..., shell=True, ...)
      - pattern-not: subprocess.run("...", shell=True, ...)

  - id: python.security.sql-injection-string-concat
    languages: [python]
    severity: ERROR
    message: "Detected SQL query using string formatting or concatenation. Use parameterized queries instead."
    metadata:
      category: security
      cwe:
        - "CWE-89"
      owasp:
        - "A03:2021-Injection"
      confidence: HIGH
      technology: [python]
    patterns:
      - pattern-either:
          - pattern: |
              $CURSOR.execute(f"...{$VAR}...")
          - pattern: |
              $CURSOR.execute("..." + $VAR + "...")
          - pattern: |
              $CURSOR.execute("..." % $VAR)
          - pattern: |
              $CURSOR.execute("...".format(...))
          - pattern: |
              $CONN.execute(f"...{$VAR}...")
          - pattern: |
              $CONN.execute("..." + $VAR + "...")
          - pattern: |
              $CONN.execute("..." % $VAR)
          - pattern: |
              $CONN.execute("...".format(...))
      - pattern-not: |
          $CURSOR.execute("...", ...)

  - id: python.security.eval-usage
    languages: [python]
    severity: ERROR
    message: "Detected eval() usage with non-literal argument. eval() can execute arbitrary code and is dangerous."
    metadata:
      category: security
      cwe:
        - "CWE-94"
      owasp:
        - "A03:2021-Injection"
      confidence: HIGH
      technology: [python]
    patterns:
      - pattern: eval($VAR)
      - pattern-not: eval("...")

  - id: python.security.pickle-load
    languages: [python]
    severity: ERROR
    message: "Detected pickle.loads() or pickle.load() usage. Pickle deserialization can execute arbitrary code."
    metadata:
      category: security
      cwe:
        - "CWE-502"
      owasp:
        - "A08:2021-Software and Data Integrity Failures"
      confidence: HIGH
      technology: [python]
    pattern-either:
      - pattern: pickle.loads(...)
      - pattern: pickle.load(...)

  - id: python.security.yaml-unsafe-load
    languages: [python]
    severity: ERROR
    message: "Detected yaml.load() without SafeLoader. Use yaml.safe_load() or yaml.load(data, Loader=yaml.SafeLoader) instead."
    metadata:
      category: security
      cwe:
        - "CWE-502"
      owasp:
        - "A08:2021-Software and Data Integrity Failures"
      confidence: HIGH
      technology: [python]
    patterns:
      - pattern: yaml.load(...)
      - pattern-not: yaml.load(..., Loader=yaml.SafeLoader)

  - id: python.security.hardcoded-secret-string
    languages: [python]
    severity: WARNING
    message: "Detected hardcoded secret in string assignment. Use environment variables or a secret manager instead."
    metadata:
      category: security
      cwe:
        - "CWE-798"
      owasp:
        - "A07:2021-Identification and Authentication Failures"
      confidence: MEDIUM
      technology: [python]
    patterns:
      - pattern-either:
          - pattern: |
              $VAR = "...password..."
          - pattern: |
              $VAR = "...secret..."
          - pattern: |
              $VAR = "...api_key..."
          - pattern: |
              $VAR = "...apikey..."
          - pattern: |
              $VAR = "...token..."
      - pattern-not: |
          $VAR = os.environ.get(...)
      - pattern-not: |
          $VAR = os.getenv(...)

  - id: python.security.ssrf-requests
    languages: [python]
    severity: ERROR
    message: "Detected requests call with user-controlled URL. Validate URLs against an allowlist to prevent SSRF."
    metadata:
      category: security
      cwe:
        - "CWE-918"
      owasp:
        - "A10:2021-Server-Side Request Forgery"
      confidence: MEDIUM
      technology: [python]
    patterns:
      - pattern-either:
          - pattern: requests.get($URL)
          - pattern: requests.post($URL, ...)
          - pattern: requests.put($URL, ...)
          - pattern: requests.delete($URL)
          - pattern: requests.head($URL)
          - pattern: $SESSION.get($URL)
          - pattern: $SESSION.post($URL, ...)
      - pattern-not: requests.get("...")
      - pattern-not: requests.post("...", ...)

  - id: python.security.path-traversal
    languages: [python]
    severity: ERROR
    message: "Detected file operation with user-controlled path. Validate and sanitize paths to prevent directory traversal."
    metadata:
      category: security
      cwe:
        - "CWE-22"
      owasp:
        - "A01:2021-Broken Access Control"
      confidence: MEDIUM
      technology: [python]
    patterns:
      - pattern-either:
          - pattern: open($USER_INPUT, ...)
          - pattern: os.path.join($BASE, $USER_INPUT)
          - pattern: pathlib.Path($USER_INPUT)
          - pattern: os.path.join($BASE, $USER_INPUT, ...)
      - pattern-not: open("...", ...)
      - pattern-not: os.path.join("...", "...")
      - pattern-not: pathlib.Path("...")

  - id: python.security.open-redirect
    languages: [python]
    severity: WARNING
    message: "Detected redirect with user-controlled URL. Validate redirect targets against an allowlist."
    metadata:
      category: security
      cwe:
        - "CWE-601"
      owasp:
        - "A01:2021-Broken Access Control"
      confidence: MEDIUM
      technology: [python]
    patterns:
      - pattern-either:
          - pattern: redirect($USER_INPUT)
          - pattern: HttpResponseRedirect($USER_INPUT)
      - pattern-not: redirect("...")
      - pattern-not: HttpResponseRedirect("...")

  - id: python.security.insecure-random
    languages: [python]
    severity: WARNING
    message: "Detected random module used for security purposes. Use secrets module instead."
    metadata:
      category: security
      cwe:
        - "CWE-338"
      owasp:
        - "A02:2021-Cryptographic Failures"
      confidence: MEDIUM
      technology: [python]
    patterns:
      - pattern-either:
          - pattern: random.randint(...)
          - pattern: random.choice(...)
          - pattern: random.random()
          - pattern: random.uniform(...)
      - pattern-not-inside: |
          import random
          ...
          random.shuffle($LIST)

  - id: python.security.timing-attack
    languages: [python]
    severity: WARNING
    message: "Detected non-constant-time comparison of secrets. Use hmac.compare_digest() to prevent timing attacks."
    metadata:
      category: security
      cwe:
        - "CWE-208"
      owasp:
        - "A02:2021-Cryptographic Failures"
      confidence: MEDIUM
      technology: [python]
    patterns:
      - pattern-either:
          - pattern: $SECRET == $VAR
          - pattern: $VAR == $SECRET
      - metavariable-regex:
          metavariable: $SECRET
          regex: "(?i)(password|token|secret|key|api_key|auth)"
      - pattern-not: hmac.compare_digest(...)
