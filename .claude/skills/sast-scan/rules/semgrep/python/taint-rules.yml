# Python taint-mode rules: track web/request input through assignments into sinks.

rules:
  - id: python.security.taint-sql-injection
    languages: [python]
    severity: ERROR
    message: "Untrusted input flows into SQL execution. Use parameterized queries."
    metadata:
      category: security
      cwe: ["CWE-89"]
      owasp: ["A03:2021-Injection"]
      confidence: MEDIUM
      technology: [python]
    mode: taint
    pattern-sources: &py_web_sources
      - pattern: flask.request.args.get(...)
      - pattern: flask.request.form.get(...)
      - pattern: flask.request.form[...]
      - pattern: flask.request.values.get(...)
      - pattern: request.args.get(...)
      - pattern: request.GET.get(...)
      - pattern: request.POST.get(...)
      - pattern: request.form.get(...)
      - pattern: input(...)
    pattern-sanitizers: &py_sanitizers
      - pattern: int(...)
      - pattern: float(...)
      - pattern: shlex.quote(...)
    pattern-propagators: &py_propagators
      - pattern: $X + $Y
        from: $X
        to: $Y
      - pattern: f"...{$X}..."
        from: $X
        to: ...
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: $CURSOR.execute($SQL, ...)
              - pattern: $CONN.execute($SQL, ...)
          - focus-metavariable: $SQL

  - id: python.security.taint-command-injection
    languages: [python]
    severity: ERROR
    message: "Untrusted input flows into command execution."
    metadata:
      category: security
      cwe: ["CWE-78"]
      owasp: ["A03:2021-Injection"]
      confidence: MEDIUM
      technology: [python]
    mode: taint
    pattern-sources:
      - pattern: flask.request.args.get(...)
      - pattern: flask.request.form.get(...)
      - pattern: flask.request.form[...]
      - pattern: flask.request.values.get(...)
      - pattern: request.args.get(...)
      - pattern: request.GET.get(...)
      - pattern: request.POST.get(...)
      - pattern: request.form.get(...)
      - pattern: input(...)
    pattern-sanitizers:
      - pattern: int(...)
      - pattern: float(...)
      - pattern: shlex.quote(...)
    pattern-propagators:
      - pattern: $X + $Y
        from: $X
        to: $Y
      - pattern: f"...{$X}..."
        from: $X
        to: ...
    pattern-sinks:
      - patterns:
          - pattern-either:
