# SOC 2 — Service Organization Controls (AICPA Trust Services Criteria 2017)
# Uses pattern-regex (generic language) for cross-language detection.
# NOTE: Semgrep pattern-regex rules must use languages: [generic] to avoid
# per-language parser mismatches.

rules:
  # CC6.1 — Access Control via authentication/authorization checks
  - id: soc2.access-control-missing-auth
    languages: [generic]
    severity: WARNING
    message: "Endpoint or handler may lack explicit authentication check per SOC 2 CC6.1."
    metadata:
      category: compliance
      cwe: ["CWE-306"]
      owasp: ["A01:2021-Broken Access Control"]
      confidence: LOW
      technology: [python, javascript, typescript, java]
      compliance: ["SOC 2 CC6.1"]
    pattern-either:
      - pattern-regex: '@app\.route\([^)]*\)\s*\ndef\s+\w+\([^)]*\):\s*\n\s*(?!@login_required)'
      - pattern-regex: 'app\.(get|post|put|delete|patch)\s*\(\s*"[^"]*"\s*,\s*(?!requireAuth\b)'

  # CC7.2 — System Monitoring (anomaly detection / audit logging)
  - id: soc2.logging-not-configured
    languages: [generic]
    severity: INFO
    message: "Logger configured without security-audit level. SOC 2 CC7.2 requires security event logging."
    metadata:
      category: compliance
      cwe: ["CWE-778"]
      owasp: ["A09:2021-Security Logging and Monitoring Failures"]
      confidence: LOW
      technology: [python, javascript, typescript, java]
      compliance: ["SOC 2 CC7.2"]
    pattern-either:
      - pattern-regex: logging\.basicConfig\s*\(\s*level\s*=\s*logging\.(?:INFO|WARNING|ERROR)
      - pattern-regex: logging\.setLevel\s*\(\s*logging\.(?:INFO|WARNING|ERROR)

  # CC7.1 — Known vulnerabilities / patch management
  - id: soc2.no-vulnerability-scanning
    languages: [generic]
    severity: INFO
    message: "Dependency not pinned. Pin exact versions for reproducible builds per SOC 2 CC7.1."
    metadata:
      category: compliance
      cwe: ["CWE-1104"]
      owasp: ["A06:2021-Vulnerable and Outdated Components"]
      confidence: LOW
      technology: [python, javascript, typescript]
      compliance: ["SOC 2 CC7.1"]
    pattern-regex: '\\^[0-9]'
