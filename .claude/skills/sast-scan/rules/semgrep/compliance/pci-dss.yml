# PCI-DSS 4.0 — Payment Card Industry Data Security Standard
# Key requirements mapped to source-code detectable patterns

rules:
  # Req 3.4 — Render PAN unreadable (no logging of card data)
  - id: pci-dss.logging-card-data
    languages: [python, javascript, typescript, java, php, ruby]
    severity: ERROR
    message: "Logging of credit card / PAN data detected. PCI-DSS 3.4 prohibits logging of full PAN."
    metadata:
      category: compliance
      cwe: ["CWE-532"]
      owasp: ["A09:2021-Security Logging and Monitoring Failures"]
      confidence: MEDIUM
      technology: [python, javascript, typescript, java, php, ruby]
      compliance: ["PCI-DSS 4.0 3.4"]
    patterns:
      - pattern-either:
          - pattern: $LOGGER.info(..., $CARD, ...)
          - pattern: $LOGGER.debug(..., $CARD, ...)
          - pattern: $LOGGER.error(..., $CARD, ...)
          - pattern: console.log(..., $CARD, ...)
          - pattern: System.out.println(..., $CARD, ...)
      - metavariable-regex:
          metavariable: $CARD
          regex: (?i).*(pan|card.?number|credit.?card|ccv|cvv|cvc|track.?data|cvn).*

  # Req 6.5.2 — No default passwords or hardcoded credentials
  - id: pci-dss.default-credentials
    languages: [python, javascript, typescript, java, php, ruby, go, csharp]
    severity: ERROR
    message: "Default credentials or hardcoded password detected. PCI-DSS 6.5.2 requires unique credentials."
    metadata:
      category: compliance
      cwe: ["CWE-798"]
      owasp: ["A07:2021-Identification and Authentication Failures"]
      confidence: HIGH
      technology: [python, javascript, typescript, java, php, ruby, go, csharp]
      compliance: ["PCI-DSS 4.0 6.5.2"]
    patterns:
      - pattern-either:
          - pattern: $VAR = "admin"
          - pattern: $VAR = "password"
          - pattern: $VAR = "changeme"
          - pattern: $VAR = "default"
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i)(password|passwd|pwd|admin_pass|default_pass)

  # Req 4.2.1 — Strong cryptography for transmission (no HTTP for sensitive data)
  - id: pci-dss.http-transmission-sensitive
    languages: [javascript, typescript, python, java]
    severity: WARNING
    message: "Sensitive data transmission over HTTP. PCI-DSS 4.2.1 requires strong cryptography in transit."
    metadata:
      category: compliance
      cwe: ["CWE-319"]
      owasp: ["A02:2021-Cryptographic Failures"]
      confidence: MEDIUM
      technology: [javascript, typescript, python, java]
      compliance: ["PCI-DSS 4.0 4.2.1"]
    pattern-either:
      - pattern-regex: fetch\s*\(\s*["\']http://
      - pattern-regex: request\.(?:get|post|put)\s*\(\s*["\']http://

  # Req 6.5.1 — Injection flaws (SQL injection)
  - id: pci-dss.sql-string-concatenation
    languages: [python, javascript, typescript, java, ruby, csharp]
    severity: ERROR
    message: "SQL string concatenation detected. PCI-DSS 6.5.1 requires parameterized queries."
    metadata:
      category: compliance
      cwe: ["CWE-89"]
      owasp: ["A03:2021-Injection"]
      confidence: HIGH
      technology: [python, javascript, typescript, java, ruby, csharp]
      compliance: ["PCI-DSS 4.0 6.5.1"]
    patterns:
      - pattern-either:
          - pattern: |
              $CURSOR.execute("..." + $VAR)
          - pattern: |
              $CURSOR.execute("..." + $VAR + "...")
          - pattern: |
              $CONN.execute("..." + $VAR)
          - pattern: |
              $CONN.execute("..." + $VAR + "...")
      - pattern-not: |
          $CURSOR.execute("...", ...)
      - pattern-not: |
          $CONN.execute("...", ...)
