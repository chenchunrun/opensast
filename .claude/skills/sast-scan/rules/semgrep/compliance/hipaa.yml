# HIPAA — Health Insurance Portability and Accountability Act
# Security Rule (45 CFR Part 164 Subpart C) code-detectable patterns

rules:
  # 164.312(a)(1) — Access Control: unique user identification
  - id: hipaa.access-no-user-audit
    languages: [python, javascript, typescript, java, php, ruby]
    severity: WARNING
    message: "PHI access without user identification logging. HIPAA 164.312(a)(1) requires unique user tracking."
    metadata:
      category: compliance
      cwe: ["CWE-778"]
      owasp: ["A09:2021-Security Logging and Monitoring Failures"]
      confidence: MEDIUM
      technology: [python, javascript, typescript, java, php, ruby]
      compliance: ["HIPAA 164.312(a)(1)"]
    patterns:
      - pattern-either:
          - pattern: |
              def $F(patient_id, ...):
                  ...
                  return
          - pattern: |
              app.$METHOD("/patients/...", ...)
      - pattern-not-inside: |
          ...
          log_user_access(...)
          ...

  # 164.312(e)(1) — Transmission Security: encryption in transit
  - id: hipaa.transmission-no-tls
    languages: [javascript, typescript, python, java]
    severity: WARNING
    message: "PHI data transmitted over unencrypted channel. HIPAA 164.312(e)(1) requires transmission security."
    metadata:
      category: compliance
      cwe: ["CWE-319"]
      owasp: ["A02:2021-Cryptographic Failures"]
      confidence: MEDIUM
      technology: [javascript, typescript, python, java]
      compliance: ["HIPAA 164.312(e)(1)"]
    pattern-either:
      - pattern-regex: (?:fetch|axios\.post|requests\.post)\s*\(\s*["\']http://
      - pattern-regex: \.createConnection\s*\(\s*{\s*(?!.*\bssl\s*:\s*true)

  # 164.312(a)(2)(iv) — Encryption and Decryption of ePHI at rest
  - id: hipaa.encryption-weak-algorithm
    languages: [python, javascript, typescript, java, php, ruby]
    severity: ERROR
    message: "Weak encryption algorithm for PHI data. HIPAA 164.312(a)(2)(iv) requires adequate encryption."
    metadata:
      category: compliance
      cwe: ["CWE-326"]
      owasp: ["A02:2021-Cryptographic Failures"]
      confidence: HIGH
      technology: [python, javascript, typescript, java, php, ruby]
      compliance: ["HIPAA 164.312(a)(2)(iv)"]
    patterns:
      - pattern-either:
          - pattern: hashlib.md5(...)
          - pattern: hashlib.sha1(...)
          - pattern: MD5.Create(...)
          - pattern: Digest::MD5.hexdigest(...)
          - pattern: md5(...)
          - pattern: sha1(...)
      - pattern-not-inside: |
          ...
          # non-phi checksum
          ...

  # 164.312(b) — Audit Controls: logging of PHI access
  - id: hipaa.audit-phi-access-no-log
    languages: [python, javascript, typescript, java, php, ruby]
    severity: INFO
    message: "Database query on PHI table without audit log. HIPAA 164.312(b) requires audit controls."
    metadata:
      category: compliance
      cwe: ["CWE-532"]
      owasp: ["A09:2021-Security Logging and Monitoring Failures"]
      confidence: LOW
      technology: [python, javascript, typescript, java, php, ruby]
      compliance: ["HIPAA 164.312(b)"]
    patterns:
      - pattern-either:
          - pattern: |
              ...SELECT * FROM patients...
          - pattern: |
              ...SELECT * FROM medical_records...
          - pattern: |
              ...SELECT * FROM phi...
          - pattern: |
              ...SELECT * FROM ephi...
      - pattern-not-inside: |
          ...
          $LOGGER.audit(...)
          ...

  # 164.312(d) — Person or Entity Authentication: no session timeout
  - id: hipaa.session-no-timeout
    languages: [python, javascript, typescript, java, php, ruby]
    severity: WARNING
    message: "Session configuration without timeout. HIPAA 164.312(d) requires automatic logoff."
    metadata:
      category: compliance
      cwe: ["CWE-613"]
      owasp: ["A07:2021-Identification and Authentication Failures"]
      confidence: MEDIUM
      technology: [python, javascript, typescript, java, php, ruby]
      compliance: ["HIPAA 164.312(d)"]
    patterns:
      - pattern-either:
          - pattern: |
              session.permanent = true
          - pattern: |
              SESSION_COOKIE_AGE = None
          - pattern: |
              cookie: {..., maxAge: null, ...}
          - pattern: |
              cookie: {..., maxAge: undefined, ...}
