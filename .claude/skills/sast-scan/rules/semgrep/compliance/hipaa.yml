# HIPAA — Security Rule (45 CFR Part 164 Subpart C)
# Uses pattern-regex for cross-language detection to avoid parser mismatches.

rules:
  # 164.312(e)(1) — Transmission Security
  - id: hipaa.transmission-no-tls
    languages: [generic]
    severity: WARNING
    message: "Data transmitted over unencrypted HTTP channel. HIPAA 164.312(e)(1) requires transmission security."
    metadata:
      category: compliance
      cwe: ["CWE-319"]
      owasp: ["A02:2021-Cryptographic Failures"]
      confidence: MEDIUM
      technology: [javascript, typescript, python, java]
      compliance: ["HIPAA 164.312(e)(1)"]
    pattern-either:
      - pattern-regex: |-
          (?:fetch|axios\.post|requests\.post)\s*\(\s*['"]http://
      - pattern-regex: |-
          \.createConnection\s*\(\s*\{\s*(?!.*\bssl\s*:\s*true)

  # 164.312(a)(2)(iv) — Encryption at rest (weak algorithms)
  - id: hipaa.encryption-weak-algorithm
    languages: [generic]
    severity: ERROR
    message: "Weak encryption algorithm used for data. HIPAA 164.312(a)(2)(iv) requires adequate encryption."
    metadata:
      category: compliance
      cwe: ["CWE-326"]
      owasp: ["A02:2021-Cryptographic Failures"]
      confidence: HIGH
      technology: [python, javascript, typescript, java, php, ruby]
      compliance: ["HIPAA 164.312(a)(2)(iv)"]
    pattern-either:
      - pattern-regex: hashlib\.md5\s*\(
      - pattern-regex: hashlib\.sha1\s*\(
      - pattern-regex: CryptoJS\.MD5\s*\(
      - pattern-regex: md5\s*\(\s*\$pass
      - pattern-regex: Digest::MD5\.hexdigest\s*\(
      - pattern-regex: MessageDigest\.getInstance\s*\(\s*"(MD5|SHA-1|SHA1)"

  # 164.312(d) — Session timeout
  - id: hipaa.session-no-timeout
    languages: [generic]
    severity: WARNING
    message: "Session configured without timeout or with very long duration. HIPAA 164.312(d) requires automatic logoff."
    metadata:
      category: compliance
      cwe: ["CWE-613"]
      owasp: ["A07:2021-Identification and Authentication Failures"]
      confidence: MEDIUM
      technology: [python, javascript, typescript, java]
      compliance: ["HIPAA 164.312(d)"]
    pattern-either:
      - pattern-regex: SESSION_COOKIE_AGE\s*=\s*None
      - pattern-regex: maxAge\s*:\s*(?:null|undefined|2147483647)
      - pattern-regex: <session-timeout>\s*-?\d*\s*</session-timeout>
