rules:
  # OWASP A06:2021 - Vulnerable and Outdated Components

  - id: js.security.unpinned-dependency
    languages: [generic]
    severity: WARNING
    message: "Dependency using caret (^) or tilde (~) range instead of pinned version. Pin exact versions for reproducible builds."
    metadata:
      category: security
      cwe:
        - "CWE-1104"
      owasp:
        - "A06:2021-Vulnerable and Outdated Components"
      confidence: MEDIUM
      technology: [javascript, typescript, nodejs]
    pattern-regex: :\s*"[\^~]

  - id: js.security.known-vulnerable-package-lodash-old
    languages: [generic]
    severity: WARNING
    message: "lodash < 4.17.21 has prototype pollution vulnerability. Upgrade to latest version."
    metadata:
      category: security
      cwe:
        - "CWE-1321"
      owasp:
        - "A06:2021-Vulnerable and Outdated Components"
      confidence: HIGH
      technology: [javascript, typescript, nodejs]
    pattern-regex: '"lodash"\s*:\s*"(?:\^|~)?(?:[0-3]\.|4\.(?:[0-9]|1[0-6])\.|4\.17\.(?:[0-9]|1[0-9]|20))"'

  - id: js.security.known-vulnerable-package-express-old
    languages: [generic]
    severity: WARNING
    message: "Express < 4.18.0 has known security issues. Upgrade to latest version."
    metadata:
      category: security
      cwe:
        - "CWE-1104"
      owasp:
        - "A06:2021-Vulnerable and Outdated Components"
      confidence: HIGH
      technology: [javascript, typescript, nodejs, express]
    pattern-regex: '"express"\s*:\s*"(?:\^|~)?[0-3]\.'

  - id: py.security.known-vulnerable-package-flask-old
    languages: [generic]
    severity: WARNING
    message: "Flask < 2.2.0 has known security issues. Upgrade to latest version."
    metadata:
      category: security
      cwe:
        - "CWE-1104"
      owasp:
        - "A06:2021-Vulnerable and Outdated Components"
      confidence: HIGH
      technology: [python, flask]
    pattern-regex: flask\s*=\s*"(?:\^|~)?1\.

  - id: js.security.missing-lockfile
    languages: [generic]
    severity: INFO
    message: "No lockfile found for dependency management. Add package-lock.json or yarn.lock for reproducible builds."
    metadata:
      category: security
      cwe:
        - "CWE-1104"
      owasp:
        - "A06:2021-Vulnerable and Outdated Components"
      confidence: LOW
      technology: [javascript, typescript, nodejs]
    patterns:
      - pattern: |
          package-lock.json
