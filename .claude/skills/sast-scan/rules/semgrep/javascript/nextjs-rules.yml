rules:
  - id: nextjs.security.env-default-secret
    languages: [javascript, typescript]
    severity: ERROR
    message: "Detected hardcoded default value for secret/key environment variable. Remove defaults or fail fast when secrets are not set."
    metadata:
      category: security
      cwe:
        - "CWE-798"
      owasp:
        - "A07:2021-Identification and Authentication Failures"
      confidence: MEDIUM
      technology: [nextjs, javascript, typescript]
    patterns:
      - pattern-either:
          - pattern: |
              process.env.$ENV || "..."
          - pattern: |
              process.env[$ENV] || "..."
      - metavariable-regex:
          metavariable: $ENV
          regex: "(?i).*(SECRET|KEY|PASSWORD|TOKEN|SALT|API_KEY|PRIVATE|AUTH|NEXTAUTH).*"

  - id: nextjs.security.insecure-cookie
    languages: [javascript, typescript]
    severity: WARNING
    message: "Detected cookie without Secure or HttpOnly flag. Set these flags to prevent client-side access and ensure HTTPS-only transmission."
    metadata:
      category: security
      cwe:
        - "CWE-614"
      owasp:
        - "A05:2021-Security Misconfiguration"
      confidence: MEDIUM
      technology: [nextjs, javascript, typescript]
    patterns:
      - pattern: |
          cookies().set($NAME, $VALUE, { ... })
      - pattern-not-inside: |
          cookies().set($NAME, $VALUE, { ..., httpOnly: true, secure: true, ... })

  - id: nextjs.security.trust-host
    languages: [javascript, typescript]
    severity: WARNING
    message: "Detected trustHost: true in NextAuth config. This disables host validation and can allow session hijacking."
    metadata:
      category: security
      cwe:
        - "CWE-613"
      owasp:
        - "A07:2021-Identification and Authentication Failures"
      confidence: MEDIUM
      technology: [nextjs, javascript, typescript]
    patterns:
      - pattern: |
          trustHost: true

  - id: nextjs.security.raw-query-unsafe
    languages: [javascript, typescript]
    severity: ERROR
    message: "Detected $queryRawUnsafe usage. Use $queryRaw with tagged template literals for parameterized queries."
    metadata:
      category: security
      cwe:
        - "CWE-89"
      owasp:
        - "A03:2021-Injection"
      confidence: HIGH
      technology: [nextjs, prisma, javascript, typescript]
    patterns:
      - pattern: |
          $DB.$queryRawUnsafe(`...${...}...`)
      - pattern-not: |
          $DB.$queryRawUnsafe("...", $VAR)
