rules:
  - id: js.security.timing-unsafe-secret-compare
    languages: [javascript, typescript]
    severity: HIGH
    message: "Timing-unsafe comparison on secrets. Use crypto.timingSafeEqual() or secureCompare()."
    metadata:
      category: security
      cwe:
        - "CWE-208"
      owasp:
        - "A02:2021-Cryptographic Failures"
      confidence: HIGH
      technology: [javascript, typescript, nodejs]
    patterns:
      - pattern-either:
          - pattern: |
              if ($A !== $B)
          - pattern: |
              if ($B === $A)
      - metavariable-regex:
          metavariable: $A
          regex: "(?i)(token|secret|apikey|password|key|bearer|auth)"
      - pattern-not: |
          timingSafeEqual(...)
      - pattern-not: |
          secureCompare(...)
      - pattern-not: |
          crypto.timingSafeEqual(...)

  - id: js.security.insecure-crypto-fallback
    languages: [javascript, typescript]
    severity: HIGH
    message: "Base64 decode used as decryption fallback. Use proper AES/GCM decryption."
    metadata:
      category: security
      cwe:
        - "CWE-327"
      owasp:
        - "A02:2021-Cryptographic Failures"
      confidence: HIGH
      technology: [javascript, typescript, nodejs]
    patterns:
      - pattern-either:
          - pattern: |
              Buffer.from($DATA, "base64").toString()
          - patterns:
              - pattern-inside: |
                  function $DECRYPT(...) {
                      ...
                      atob($DATA)
                      ...
                  }
              - metavariable-regex:
                  metavariable: $DECRYPT
                  regex: "(?i)(decrypt|decode)"
              - pattern: |
                  atob($DATA)

  - id: js.security.prisma-missing-ownership
    languages: [javascript, typescript]
    severity: HIGH
    message: "Prisma query missing ownership check. Add userId or teamId to the where clause."
    metadata:
      category: security
      cwe:
        - "CWE-862"
      owasp:
        - "A01:2021-Broken Access Control"
      confidence: HIGH
      technology: [javascript, typescript, prisma, nodejs]
    patterns:
      - pattern-either:
          - pattern: |
              $PRISMA.findUnique({ where: { id: $ID } })
          - pattern: |
              $PRISMA.findFirst({ where: { id: $ID } })
      - pattern-not-inside: |
          $PRISMA.findUnique({ where: { ..., userId: $UID, ... } })
      - pattern-not-inside: |
          $PRISMA.findFirst({ where: { ..., userId: $UID, ... } })
      - pattern-not-inside: |
          $PRISMA.findUnique({ where: { ..., teamId: $TID, ... } })
      - pattern-not-inside: |
          $PRISMA.findFirst({ where: { ..., teamId: $TID, ... } })
      - pattern-not-inside: |
          $PRISMA.findUnique({ where: { ..., ownerId: $OID, ... } })
      - pattern-not-inside: |
          $PRISMA.findFirst({ where: { ..., ownerId: $OID, ... } })

  - id: js.security.plaintext-token-storage
    languages: [javascript, typescript]
    severity: MEDIUM
    message: "Token stored in plaintext. Hash tokens before storage."
    metadata:
      category: security
      cwe:
        - "CWE-256"
      owasp:
        - "A07:2021-Identification and Authentication Failures"
      confidence: MEDIUM
      technology: [javascript, typescript, prisma, nodejs]
    patterns:
      - pattern-either:
          - pattern: |
              $PRISMA.create({ data: { token: $VAR } })
          - pattern: |
              $PRISMA.create({ data: { verificationToken: $VAR } })
          - pattern: |
              $PRISMA.create({ data: { resetToken: $VAR } })
          - pattern: |
              $PRISMA.create({ data: { confirmToken: $VAR } })
          - pattern: |
              $PRISMA.update({ data: { token: $VAR } })
          - pattern: |
              $PRISMA.update({ data: { verificationToken: $VAR } })
          - pattern: |
              $PRISMA.update({ data: { resetToken: $VAR } })
          - pattern: |
              $PRISMA.update({ data: { confirmToken: $VAR } })
      - pattern-not: |
          $PRISMA.create({ data: { token: $HASH(...) } })
      - pattern-not: |
          $PRISMA.update({ data: { token: $HASH(...) } })

  - id: js.security.auth-endpoint-no-ratelimit
    languages: [javascript, typescript]
    severity: MEDIUM
    message: "Auth endpoint missing rate limiting. Add rate limiting to prevent brute force attacks."
    metadata:
      category: security
      cwe:
        - "CWE-307"
      owasp:
        - "A07:2021-Identification and Authentication Failures"
      confidence: MEDIUM
      technology: [javascript, typescript, express, nodejs]
    patterns:
      - pattern-either:
          - pattern-inside: |
              function $HANDLER(..., $REQ, $RES, ...) {
                  ...
              }
          - pattern-inside: |
              $APP.$METHOD($PATH, function $HANDLER(..., $REQ, $RES, ...) {
                  ...
              })
      - metavariable-regex:
          metavariable: $PATH
          regex: "(?i)(register|login|reset-password|forgot-password|verify-email|signin|signup|auth)"
      - pattern-not: |
          rateLimit(...)
      - pattern-not: |
          checkRateLimit(...)
      - pattern-not: |
          rateLimiter(...)
