rules:
  - id: javascript.security.command-injection-exec
    languages: [javascript, typescript]
    severity: ERROR
    message: "Detected child_process.exec/execSync with variable interpolation. Use execFile or spawn with array arguments instead."
    metadata:
      category: security
      cwe:
        - "CWE-78"
      owasp:
        - "A03:2021-Injection"
      confidence: HIGH
      technology: [javascript, typescript, nodejs]
    patterns:
      - pattern-either:
          - pattern: |
              exec(`...${...}...`)
          - pattern: |
              execSync(`...${...}...`)
          - pattern: |
              exec("..." + $VAR + "...")
          - pattern: |
              exec("..." + $VAR)
          - pattern: |
              execSync("..." + $VAR + "...")
          - pattern: |
              execSync("..." + $VAR)
          - pattern-regex: |
              exec(?:Sync)?\(`[^`]*\$\{
          - pattern-regex: |
              exec(?:Sync)?\("[^"]*"\s*\+\s*\w+
          - pattern: |
              require('child_process').exec(`...${...}...`)
          - pattern: |
              require('child_process').execSync(`...${...}...`)
          - pattern: |
              require('child_process').exec("..." + $VAR + "...")
          - pattern: |
              require('child_process').exec("..." + $VAR)
          - pattern: |
              require('child_process').execSync("..." + $VAR + "...")
          - pattern: |
              require('child_process').execSync("..." + $VAR)
      - pattern-not: |
          exec("...")
      - pattern-not: |
          execSync("...")
      - pattern-not: |
          require('child_process').exec("...")
      - pattern-not: |
          require('child_process').execSync("...")

  - id: javascript.security.sql-injection-string-concat
    languages: [javascript, typescript]
    severity: ERROR
    message: "Detected SQL query using string interpolation or concatenation. Use parameterized queries instead."
    metadata:
      category: security
      cwe:
        - "CWE-89"
      owasp:
        - "A03:2021-Injection"
      confidence: HIGH
      technology: [javascript, typescript, nodejs]
    patterns:
      - pattern-either:
          - pattern: |
              $CONN.query(`...${...}...`)
          - pattern: |
              $CONN.query("..." + $VAR + "...")
          - pattern: |
              $CONN.query("..." + $VAR)
          - pattern-regex: |
              \.query\(`[^`]*\$\{
          - pattern-regex: |
              \.query\("[^"]*"\s*\+\s*\w+
          - pattern: |
              $CONN.query("...", function(...) {...})
          - pattern: |
              $CONN.execute(`...${...}...`)
          - pattern: |
              $CONN.execute("..." + $VAR + "...")
          - pattern: |
              $CONN.execute("..." + $VAR)
          - pattern: |
              $CONN.$queryRawUnsafe(`...${...}...`)
          - pattern: |
              $CONN.$queryRawUnsafe("..." + $VAR + "...")
      - pattern-not: |
          $CONN.query("...", [...])
      - pattern-not: |
          $CONN.query("...", $VAR)
      - pattern-not: |
          $CONN.execute("...", [...])

  - id: javascript.security.xss-response-send
    languages: [javascript, typescript]
    severity: WARNING
    message: "Detected res.send/res.write with string interpolation of user input. Sanitize output before sending to prevent XSS."
    metadata:
      category: security
      cwe:
        - "CWE-79"
      owasp:
        - "A03:2021-Injection"
      confidence: MEDIUM
      technology: [javascript, typescript, express]
    patterns:
      - pattern-either:
          - pattern: |
              $RES.send(`...${...}...`)
          - pattern: |
              $RES.write(`...${...}...`)
          - pattern: |
              $RES.send("..." + $VAR + "...")
          - pattern: |
              $RES.send("..." + $VAR)
          - pattern: |
              $RES.write("..." + $VAR + "...")
          - pattern: |
              $RES.write("..." + $VAR)
          - pattern-regex: |
              \.(?:send|write)\(`[^`]*\$\{
          - pattern-regex: |
              \.(?:send|write)\("[^"]*"\s*\+\s*\w+
      - pattern-not: |
          $RES.send(escapeHtml(...))
      - pattern-not: |
          $RES.write(escapeHtml(...))

  - id: javascript.security.path-traversal
    languages: [javascript, typescript]
    severity: ERROR
    message: "Detected file system operation with user-controlled path component. Validate and sanitize paths to prevent directory traversal."
    metadata:
      category: security
      cwe:
        - "CWE-22"
      owasp:
        - "A01:2021-Broken Access Control"
      confidence: MEDIUM
      technology: [javascript, typescript, nodejs]
    patterns:
      - pattern-either:
          - pattern: |
              $FS.readFile(`...${...}...`)
          - pattern: |
              $FS.readFile(`...${...}...`, ...)
          - pattern: |
              $FS.readFile("..." + $VAR + "...")
          - pattern: |
              $FS.readFile("..." + $VAR)
          - pattern: |
              $FS.readFileSync(`...${...}...`)
          - pattern: |
              $FS.readFileSync("..." + $VAR + "...")
          - pattern: |
              $FS.readFileSync("..." + $VAR)
          - pattern-regex: |
              readFile(?:Sync)?\(`[^`]*\$\{
          - pattern-regex: |
              readFile(?:Sync)?\("[^"]*"\s*\+\s*\w+
          - pattern: |
              $FS.writeFile(`...${...}...`, ...)
          - pattern: |
              $FS.writeFile("..." + $VAR + "...", ...)
          - pattern: |
              $FS.unlink(`...${...}...`)
          - pattern: |
              $FS.unlinkSync(`...${...}...`)
          - pattern: |
              path.join($BASE, $USER_INPUT)
      - pattern-not: |
          path.join("...", "...")
      - pattern-not: |
          $FS.readFile("...")

  - id: javascript.security.ssrf-fetch
    languages: [javascript, typescript]
    severity: ERROR
    message: "Detected fetch/HTTP request with user-controlled URL. Validate URLs against an allowlist to prevent SSRF."
    metadata:
      category: security
      cwe:
        - "CWE-918"
      owasp:
        - "A10:2021-Server-Side Request Forgery"
      confidence: MEDIUM
      technology: [javascript, typescript, nodejs]
    patterns:
      - pattern-either:
          - pattern: |
              fetch($REQ.query.$FIELD)
          - pattern: |
              fetch($REQ.body.$FIELD)
          - pattern: |
              fetch($REQ.params.$FIELD)
          - pattern: |
              fetch($USER_INPUT)
          - pattern: |
              axios.get($USER_INPUT)
          - pattern: |
              axios.post($USER_INPUT, ...)
          - pattern: |
              got($USER_INPUT)
          - pattern: |
              got.get($USER_INPUT)
          - pattern: |
              http.get($USER_INPUT, ...)
          - pattern: |
              https.get($USER_INPUT, ...)
          - pattern: |
              request($USER_INPUT, ...)
      - pattern-not: |
          fetch("...")
      - pattern-not: |
          fetch(`...`)
      - pattern-not: |
          axios.get("...")
      - pattern-not: |
          got("...")
      - pattern-not: |
          http.get("...", ...)

  - id: javascript.security.open-redirect
    languages: [javascript, typescript]
    severity: WARNING
    message: "Detected redirect with user-controlled URL. Validate redirect targets against an allowlist."
    metadata:
      category: security
      cwe:
        - "CWE-601"
      owasp:
        - "A01:2021-Broken Access Control"
      confidence: MEDIUM
      technology: [javascript, typescript, nextjs]
    patterns:
      - pattern-either:
          - pattern: |
              $RES.redirect($USER_INPUT)
          - pattern: |
              NextResponse.redirect($USER_INPUT)
          - pattern: |
              Response.redirect($USER_INPUT)
      - pattern-not: |
          $RES.redirect("...")
      - pattern-not: |
          NextResponse.redirect(new URL("...", ...))
      - pattern-not: |
          NextResponse.redirect(`...`)
      - pattern-not: |
          Response.redirect(`...`)
      - pattern-not: |
          $RES.redirect(`...`)

  - id: javascript.security.insecure-random
    languages: [javascript, typescript]
    severity: WARNING
    message: "Detected Math.random() used for security-sensitive purposes. Use crypto.randomBytes() or crypto.getRandomValues() instead."
    metadata:
      category: security
      cwe:
        - "CWE-338"
      owasp:
        - "A02:2021-Cryptographic Failures"
      confidence: LOW
      technology: [javascript, typescript, nodejs]
    patterns:
      - pattern: Math.random()
      # Flag Math.random() when it produces a value (assignment or template),
      # including chained calls like Math.random().toString(36).substr(...).
      - pattern-either:
          - pattern-inside: |
              $VAR = ...
          - pattern-inside: |
              `...`
      - pattern-not-inside: |
          if (...) { ... }
      - pattern-not-inside: |
          while (...) { ... }
      - pattern-not-inside: |
          Math.random() * $VAL
      - pattern-not-inside: |
          Math.random() < $VAL

  - id: javascript.security.timing-attack
    languages: [javascript, typescript]
    severity: WARNING
    message: "Detected non-constant-time comparison of secrets. Use crypto.timingSafeEqual() to prevent timing attacks."
    metadata:
      category: security
      cwe:
        - "CWE-208"
      owasp:
        - "A02:2021-Cryptographic Failures"
      confidence: MEDIUM
      technology: [javascript, typescript, nodejs]
    patterns:
      - pattern-regex: (?i)\b(password|token|secret|api_key|auth)\w*\s*(===|!==)\s*
      - pattern-not: |
          crypto.timingSafeEqual(...)

  - id: javascript.security.hardcoded-secret-default
    languages: [javascript, typescript]
    severity: ERROR
    message: "Detected hardcoded default value for secret/key. Remove defaults or use runtime validation to ensure secrets are set."
    metadata:
      category: security
      cwe:
        - "CWE-798"
      owasp:
        - "A07:2021-Identification and Authentication Failures"
      confidence: MEDIUM
      technology: [javascript, typescript, nodejs]
    patterns:
      - pattern-either:
          - pattern: |
              process.env.$ENV || "..."
          - pattern: |
              process.env[$ENV] || "..."
      - metavariable-regex:
          metavariable: $ENV
          regex: "(?i).*(SECRET|KEY|PASSWORD|TOKEN|SALT|API_KEY|PRIVATE|AUTH).*"

  - id: javascript.security.insecure-cors
    languages: [javascript, typescript]
    severity: WARNING
    message: "Detected dynamic CORS origin header. Validate origin against an allowlist instead of reflecting user input."
    metadata:
      category: security
      cwe:
        - "CWE-942"
      owasp:
        - "A05:2021-Security Misconfiguration"
      confidence: MEDIUM
      technology: [javascript, typescript, nodejs]
    patterns:
      - pattern-either:
          - pattern: |
              $HEADERS.set("Access-Control-Allow-Origin", $REQ.headers.get("origin"))
          - pattern: |
              $HEADERS.set("Access-Control-Allow-Origin", $REQ.headers.get(...))
          - pattern: |
              $RES.setHeader("Access-Control-Allow-Origin", $REQ.headers.origin)
          - pattern: |
              $RES.setHeader("Access-Control-Allow-Origin", "*")
      - pattern-not: |
          $HEADERS.set("Access-Control-Allow-Origin", "...")

  - id: javascript.security.csrf-bypass-env
    languages: [javascript, typescript]
    severity: WARNING
    message: "Detected CSRF protection bypass based on environment variable. CSRF protection should be enabled in all environments."
    metadata:
      category: security
      cwe:
        - "CWE-352"
      owasp:
        - "A01:2021-Broken Access Control"
      confidence: HIGH
      technology: [javascript, typescript, nodejs]
    patterns:
      - pattern: |
          if (process.env.NODE_ENV !== "production") {
              return { ok: true }
          }
      - pattern: |
          if (process.env.$ENV !== "production") {
              return ...
          }

  - id: javascript.security.eval-usage
    languages: [javascript, typescript]
    severity: ERROR
    message: "Detected eval() with non-literal argument. eval() can execute arbitrary code. Use safer alternatives."
    metadata:
      category: security
      cwe:
        - "CWE-94"
      owasp:
        - "A03:2021-Injection"
      confidence: HIGH
      technology: [javascript, typescript, nodejs]
    patterns:
      - pattern-either:
          - pattern: eval($VAR)
          - pattern: new Function($VAR)
          # NOTE: setTimeout/setInterval are intentionally NOT treated as eval.
          # A function-arg call like `setTimeout(() => controller.abort(), ms)`
          # is not code injection; only a string-arg form is eval-equivalent and
          # that is too weak/common to flag at ERROR severity here.
      - pattern-not: eval("...")
      - pattern-not: new Function("...")

  - id: javascript.security.deserialize-unsafe
    languages: [javascript, typescript]
    severity: ERROR
    message: "Detected unsafe deserialization. The node-serialize library executes arbitrary code on untrusted input. Validate input and use a safe format like JSON instead."
    metadata:
      category: security
      cwe:
        - "CWE-502"
      owasp:
        - "A08:2021-Software and Data Integrity Failures"
      confidence: HIGH
      technology: [javascript, typescript, nodejs]
    patterns:
      # NOTE: JSON.parse is intentionally excluded. It parses data only — it
      # does not instantiate objects or execute code — so it is not CWE-502.
      # Only library calls that can execute code (node-serialize) belong here.
      - pattern-either:
          - pattern: |
              serialize.unserialize($USER_INPUT)
          - pattern: |
              serialize.unserializeSync($USER_INPUT)
      - pattern-not: |
          serialize.unserialize("...")

  - id: javascript.security.nosql-injection-mongo
    languages: [javascript, typescript]
    severity: ERROR
    message: "Detected MongoDB query with user-controlled $where. Use approved filter patterns instead."
    metadata:
      category: security
      cwe:
        - "CWE-89"
      owasp:
        - "A03:2021-Injection"
      confidence: HIGH
      technology: [javascript, typescript, mongodb, nodejs]
    patterns:
      - pattern: |
          {$where: $USER_INPUT}
      - pattern-not: |
          {$where: "..."}

  - id: javascript.security.hardcoded-secret-string
    languages: [javascript, typescript]
    severity: WARNING
    message: "Detected hardcoded secret in string assignment. Use environment variables or a secret manager."
    metadata:
      category: security
      cwe:
        - "CWE-798"
      owasp:
        - "A07:2021-Identification and Authentication Failures"
      confidence: MEDIUM
      technology: [javascript, typescript, nodejs]
    patterns:
      - pattern-regex: (?i)(password|secret|api_key|apikey|token|private_key)\w*\s*=\s*["'][^"']+["']
      - pattern-not: |
          const $VAR = process.env.$VAR2
      - pattern-not: |
          const $VAR = process.env[...]
