rules:
  - id: js.security.xss-html-template-title
    languages: [javascript, typescript]
    severity: ERROR
    message: "Detected user-controlled value in HTML <title> tag. Escape the value to prevent XSS."
    metadata:
      category: security
      cwe:
        - "CWE-79"
      owasp:
        - "A03:2021-Injection"
      confidence: MEDIUM
      technology: [javascript, typescript]
    patterns:
      - pattern-either:
          - pattern: |
              `<title>${$VAR}</title>`
          - pattern: |
              "<title>" + $VAR + "</title>"

  - id: js.security.xss-html-template-attribute
    languages: [javascript, typescript]
    severity: ERROR
    message: "Detected user-controlled value in HTML attribute. Escape the value to prevent XSS."
    metadata:
      category: security
      cwe:
        - "CWE-79"
      owasp:
        - "A03:2021-Injection"
      confidence: MEDIUM
      technology: [javascript, typescript]
    pattern-either:
      - pattern-regex: '`<[^`]*href\s*=\s*"\$\{'
      - pattern-regex: '`<[^`]*src\s*=\s*"\$\{'
      - pattern-regex: '`<[^`]*action\s*=\s*"\$\{'
      - pattern-regex: '`<[^`]*style\s*=\s*"\$\{'

  - id: js.security.header-injection-content-disposition
    languages: [javascript, typescript]
    severity: WARNING
    message: "Detected Content-Disposition header with unescaped variable. Sanitize filename to prevent header injection."
    metadata:
      category: security
      cwe:
        - "CWE-113"
      owasp:
        - "A05:2021-Security Misconfiguration"
      confidence: MEDIUM
      technology: [javascript, typescript, nodejs]
    pattern-either:
      - pattern-regex: Content-Disposition.*filename.*"\$\{
      - pattern-regex: Content-Disposition.*filename.*"\s*\+\s*

  - id: js.security.dom-xss-innerhtml
    languages: [javascript, typescript]
    severity: ERROR
    message: "Detected user-controlled value in innerHTML. Use textContent or sanitize input to prevent XSS."
    metadata:
      category: security
      cwe:
        - "CWE-79"
      owasp:
        - "A03:2021-Injection"
      confidence: HIGH
      technology: [javascript, typescript]
    patterns:
      - pattern-either:
          - pattern: |
              $EL.innerHTML = $USER_INPUT
          - pattern: |
              $EL.outerHTML = $USER_INPUT
      - pattern-not: |
          $EL.innerHTML = DOMPurify.sanitize(...)
      - pattern-not: |
          $EL.innerHTML = sanitize(...)

  - id: js.security.dom-xss-document-write
    languages: [javascript, typescript]
    severity: ERROR
    message: "Detected document.write with user-controlled input. Use DOM manipulation methods instead."
    metadata:
      category: security
      cwe:
        - "CWE-79"
      owasp:
        - "A03:2021-Injection"
      confidence: HIGH
      technology: [javascript, typescript]
    patterns:
      - pattern: |
          document.write($USER_INPUT)
      - pattern-not: |
          document.write("...")

  - id: js.security.prototype-pollution-merge
    languages: [javascript, typescript]
    severity: ERROR
    message: "Detected deep merge with user-controlled input. Sanitize keys to prevent prototype pollution."
    metadata:
      category: security
      cwe:
        - "CWE-1321"
      owasp:
        - "A03:2021-Injection"
      confidence: MEDIUM
      technology: [javascript, typescript, nodejs]
    patterns:
      - pattern-either:
          - pattern: |
              merge($TARGET, $USER_INPUT)
          - pattern: |
              deepMerge($TARGET, $USER_INPUT)
          - pattern: |
              extend($TARGET, $USER_INPUT)
          - pattern: |
              _.merge($TARGET, $USER_INPUT)
          - pattern: |
              $.extend(true, $TARGET, $USER_INPUT)
      - pattern-not: |
          _.merge($TARGET, { ... })
