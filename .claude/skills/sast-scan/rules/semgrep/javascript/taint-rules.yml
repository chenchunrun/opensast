# JavaScript/TypeScript taint-mode rules for Express/Node request data.

rules:
  - id: javascript.security.taint-sql-injection
    languages: [javascript, typescript]
    severity: ERROR
    message: "Untrusted request data flows into SQL query. Use parameterized queries."
    metadata:
      category: security
      cwe: ["CWE-89"]
      owasp: ["A03:2021-Injection"]
      confidence: MEDIUM
      technology: [javascript, typescript, nodejs]
    mode: taint
    pattern-sources: &js_req_sources
      - pattern: $REQ.query.$F
      - pattern: $REQ.query[...]
      - pattern: $REQ.params.$F
      - pattern: $REQ.params[...]
      - pattern: $REQ.body.$F
      - pattern: $REQ.body[...]
      - pattern: $REQ.headers[...]
      - pattern: $REQ.get(...)
    pattern-sanitizers: &js_sanitizers
      - pattern: parseInt(...)
      - pattern: Number.parseInt(...)
      - pattern: encodeURIComponent(...)
    pattern-propagators: &js_propagators
      - pattern: $X + $Y
        from: $X
        to: $Y
      - pattern: |
          `...${$X}...`
        from: $X
        to: ...
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: $DB.query($SQL, ...)
              - pattern: $CONN.query($SQL, ...)
          - focus-metavariable: $SQL

  - id: javascript.security.taint-command-injection
    languages: [javascript, typescript]
    severity: ERROR
    message: "Untrusted request data flows into command execution."
    metadata:
      category: security
      cwe: ["CWE-78"]
      owasp: ["A03:2021-Injection"]
      confidence: MEDIUM
      technology: [javascript, typescript, nodejs]
    mode: taint
    pattern-sources:
      - pattern: $REQ.query.$F
      - pattern: $REQ.query[...]
      - pattern: $REQ.params.$F
      - pattern: $REQ.params[...]
      - pattern: $REQ.body.$F
      - pattern: $REQ.body[...]
      - pattern: $REQ.headers[...]
      - pattern: $REQ.get(...)
    pattern-sanitizers:
      - pattern: parseInt(...)
      - pattern: Number.parseInt(...)
      - pattern: encodeURIComponent(...)
    pattern-propagators:
      - pattern: $X + $Y
        from: $X
        to: $Y
      - pattern: |
          `...${$X}...`
        from: $X
        to: ...
    pattern-sinks:
      - pattern-either:
          - pattern: exec($CMD, ...)
          - pattern: execSync($CMD, ...)
          - pattern: require('child_process').exec($CMD, ...)
          - pattern: require('child_process').execSync($CMD, ...)

