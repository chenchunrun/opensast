      - pattern: $REQ.query.$F
      - pattern: $REQ.query[...]
      - pattern: $REQ.params.$F
      - pattern: $REQ.params[...]
      - pattern: $REQ.body.$F
      - pattern: $REQ.body[...]
      - pattern: $REQ.headers[...]
      - pattern: $REQ.get(...)
    pattern-sanitizers:
      - pattern: parseInt(...)
      - pattern: Number.parseInt(...)
      - pattern: encodeURIComponent(...)
    pattern-propagators:
      - pattern: $X + $Y
        from: $X
        to: $Y
      - pattern: |
          `...${$X}...`
        from: $X
        to: ...
    pattern-sinks:
      - pattern-either:
          - pattern: $RES.send($BODY)
          - pattern: $RES.write($BODY)
          - pattern: $RES.end($BODY)

