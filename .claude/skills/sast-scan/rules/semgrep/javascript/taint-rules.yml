  - id: javascript.security.taint-ssrf
    languages: [javascript, typescript]
    severity: ERROR
    message: "Untrusted request data flows into outbound fetch/request."
    metadata:
      category: security
      cwe: ["CWE-918"]
      owasp: ["A10:2021-Server-Side Request Forgery"]
      confidence: MEDIUM
      technology: [javascript, typescript, nodejs]
    mode: taint
    pattern-sources:
      - pattern: $REQ.query.$F
