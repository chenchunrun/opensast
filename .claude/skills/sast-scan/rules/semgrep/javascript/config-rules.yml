rules:
  - id: js.security.bcrypt-low-cost
    languages: [javascript, typescript]
    severity: WARNING
    message: "Detected bcrypt hash with cost factor < 12. OWASP recommends minimum cost factor of 12."
    metadata:
      category: security
      cwe:
        - "CWE-916"
      owasp:
        - "A02:2021-Cryptographic Failures"
      confidence: HIGH
      technology: [javascript, typescript, nodejs]
    patterns:
      - pattern-either:
          - pattern: |
              hash($PASSWORD, 10)
          - pattern: |
              hash($PASSWORD, 9)
          - pattern: |
              hash($PASSWORD, 8)
          - pattern: |
              hash($PASSWORD, 7)
          - pattern: |
              hash($PASSWORD, 6)
          - pattern: |
              hash($PASSWORD, 5)
          - pattern: |
              hash($PASSWORD, 4)
      - pattern-not: |
          hash($PASSWORD, 12)
      - pattern-not: |
          hash($PASSWORD, 13)
      - pattern-not: |
          hash($PASSWORD, 14)

  - id: js.security.legacy-decrypt-bypass
    languages: [javascript, typescript]
    severity: ERROR
    message: "Detected fallback plaintext decode that bypasses encryption. Remove legacy paths and re-encrypt data."
    metadata:
      category: security
      cwe:
        - "CWE-327"
      owasp:
        - "A02:2021-Cryptographic Failures"
      confidence: HIGH
      technology: [javascript, typescript, nodejs]
    patterns:
      - pattern-either:
          - pattern: |
              Buffer.from($DATA, 'base64').toString('utf-8')
          - pattern: |
              atob($DATA)
      - pattern-inside: |
          function decrypt(...) { ... }

  - id: js.session.no-maxage
    languages: [javascript, typescript]
    severity: WARNING
    message: "JWT/session configuration without maxAge. Sessions may never expire."
    metadata:
      category: security
      cwe:
        - "CWE-613"
      owasp:
        - "A07:2021-Identification and Authentication Failures"
      confidence: MEDIUM
      technology: [nextjs, javascript, typescript]
    patterns:
      - pattern: |
          { session: { strategy: "jwt" } }
      - pattern-not-inside: |
          { session: { ..., maxAge: $TIME, ... } }
