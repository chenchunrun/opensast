rules:
  - id: csharp.security.sql-injection-string-concat
    languages: [csharp]
    severity: ERROR
    message: "Detected SQL query using string concatenation. Use parameterized queries with SqlParameter."
    metadata:
      category: security
      cwe: ["CWE-89"]
      owasp: ["A03:2021-Injection"]
      confidence: HIGH
      technology: [csharp]
    patterns:
      - pattern-either:
          - pattern: $CMD.CommandText = "..." + $VAR + "...";
          - pattern: $CMD.CommandText = "..." + $VAR;
          - pattern: $CONN.ExecuteReader("..." + $VAR + "...");
          - pattern: $CONN.ExecuteNonQuery("..." + $VAR + "...");

  - id: csharp.security.command-injection-process-start
    languages: [csharp]
    severity: ERROR
    message: "Detected Process.Start with user-controlled input. Validate arguments and avoid shell execution."
    metadata:
      category: security
      cwe: ["CWE-78"]
      owasp: ["A03:2021-Injection"]
      confidence: HIGH
      technology: [csharp]
    patterns:
      - pattern-either:
          - pattern: Process.Start($VAR, ...);
          - pattern: Process.Start("cmd.exe", "/c " + $VAR);
          - pattern: new ProcessStartInfo($VAR, ...);
      - pattern-not: Process.Start("...");

  - id: csharp.security.path-traversal-file
    languages: [csharp]
    severity: ERROR
    message: "Detected file operation with user-controlled path. Validate paths against an allowlist."
    metadata:
      category: security
      cwe: ["CWE-22"]
      owasp: ["A01:2021-Broken Access Control"]
      confidence: HIGH
      technology: [csharp]
    patterns:
      - pattern-either:
          - pattern: File.Open($PATH, ...);
          - pattern: File.ReadAllText($PATH);
          - pattern: File.WriteAllText($PATH, ...);
          - pattern: new FileStream($PATH, ...);
          - pattern: System.IO.File.Open($PATH, ...);
      - pattern-not: File.ReadAllText("...");
      - pattern-not: File.Open("...", ...);

  - id: csharp.security.weak-hash-md5
    languages: [csharp]
    severity: WARNING
    message: "Detected MD5 hash usage. Use SHA-256 or stronger."
    metadata:
      category: security
      cwe: ["CWE-328"]
      owasp: ["A02:2021-Cryptographic Failures"]
      confidence: HIGH
      technology: [csharp]
    patterns:
      - pattern-either:
          - pattern: MD5.Create(...)
          - pattern: System.Security.Cryptography.MD5.Create(...);
          - pattern: HashAlgorithm.Create("MD5");

  - id: csharp.security.insecure-deserialization
    languages: [csharp]
    severity: ERROR
    message: "Detected BinaryFormatter deserialization. Use safe serializers (System.Text.Json)."
    metadata:
      category: security
      cwe: ["CWE-502"]
      owasp: ["A08:2021-Software and Data Integrity Failures"]
      confidence: HIGH
      technology: [csharp]
    patterns:
      - pattern-either:
          - pattern: new BinaryFormatter();
          - pattern: $BF.Deserialize(...);

  - id: csharp.security.hardcoded-credentials
    languages: [csharp]
    severity: ERROR
    message: "Detected hardcoded credentials. Use configuration or a secret manager."
    metadata:
      category: security
      cwe: ["CWE-798"]
      owasp: ["A07:2021-Identification and Authentication Failures"]
      confidence: HIGH
      technology: [csharp]
    patterns:
      - pattern-either:
          - pattern: |
              $CONN = "...Password=..." + $PWD + "...";
          - pattern: |
              var $PWD = "...";
          - pattern: |
              string $PWD = "...";

  - id: csharp.security.ssrf-webrequest
    languages: [csharp]
    severity: ERROR
    message: "Detected HTTP request with user-controlled URL. Validate URLs against an allowlist."
    metadata:
      category: security
      cwe: ["CWE-918"]
      owasp: ["A10:2021-Server-Side Request Forgery"]
      confidence: MEDIUM
      technology: [csharp]
    patterns:
      - pattern-either:
          - pattern: WebRequest.Create($URL);
          - pattern: HttpClient.GetAsync($URL);
          - pattern: new HttpClient().GetAsync($URL);
      - pattern-not: WebRequest.Create("...");
      - pattern-not: HttpClient.GetAsync("...");

  - id: csharp.security.xss-response-write
    languages: [csharp]
    severity: ERROR
    message: "Detected unencoded user input written to HTTP response. Encode output before writing."
    metadata:
      category: security
      cwe: ["CWE-79"]
      owasp: ["A03:2021-Injection"]
      confidence: MEDIUM
      technology: [csharp]
    patterns:
      - pattern-either:
          - pattern: $RESP.Write($VAR);
          - pattern: $RESP.WriteAsync($VAR, ...);
      - pattern-not: $RESP.Write("...");
      - pattern-not: $RESP.WriteAsync("...", ...);

  - id: csharp.security.ldap-injection
    languages: [csharp]
    severity: ERROR
    message: "Detected LDAP query built from user input. Escape or parameterize filter values."
    metadata:
      category: security
      cwe: ["CWE-90"]
      owasp: ["A03:2021-Injection"]
      confidence: HIGH
      technology: [csharp]
    patterns:
      - pattern-either:
          - pattern: $S.Filter = "(uid=" + $VAR + ")";
          - pattern: $S.Filter = "(" + $VAR + ")";
      - pattern-not: $S.Filter = "(uid=admin)";

  - id: csharp.security.xpath-injection
    languages: [csharp]
    severity: ERROR
    message: "Detected XPath expression built from user input."
    metadata:
      category: security
      cwe: ["CWE-643"]
      owasp: ["A03:2021-Injection"]
      confidence: HIGH
      technology: [csharp]
    patterns:
      - pattern-either:
          - pattern: System.Xml.XPath.XPathExpression.Compile("//user[name='" + $VAR + "']");
          - pattern: $XP.Compile("//user[name='" + $VAR + "']");
      - pattern-not: System.Xml.XPath.XPathExpression.Compile("//user[name='admin']");

  - id: csharp.security.insecure-random
    languages: [csharp]
    severity: WARNING
    message: "Detected System.Random for security-sensitive values. Use RandomNumberGenerator."
    metadata:
      category: security
      cwe: ["CWE-330"]
      owasp: ["A02:2021-Cryptographic Failures"]
      confidence: HIGH
      technology: [csharp]
    patterns:
      - pattern-either:
          - pattern: new Random();
          - pattern: new System.Random();

  - id: csharp.security.open-redirect
    languages: [csharp]
    severity: WARNING
    message: "Detected redirect to user-controlled URL."
    metadata:
      category: security
      cwe: ["CWE-601"]
      owasp: ["A01:2021-Broken Access Control"]
      confidence: MEDIUM
      technology: [csharp]
    patterns:
      - pattern-either:
          - pattern: $RESP.Redirect($URL);
          - pattern: Response.Redirect($URL);
      - pattern-not: Response.Redirect("...");
      - pattern-not: $RESP.Redirect("...");

  - id: csharp.security.xml-external-entity
    languages: [csharp]
    severity: ERROR
    message: "Detected XmlReader/XmlDocument without safe resolver settings."
    metadata:
      category: security
      cwe: ["CWE-611"]
      owasp: ["A05:2021-Security Misconfiguration"]
      confidence: MEDIUM
      technology: [csharp]
    patterns:
      - pattern-either:
          - pattern: new XmlDocument();
          - pattern: XmlReader.Create($PATH);
      - pattern-not: XmlReader.Create($PATH, $SETTINGS);
