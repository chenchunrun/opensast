# CI gate — rules layer only (standard profile, SARIF upload).
# Copy to .github/workflows/sast-gate.yml

name: SAST Gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  sast-gate:
    runs-on: ubuntu-latest
    env:
      SEMGREP_SEND_METRICS: off
      SEMGREP_ENABLE_VERSION_CHECK: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          pip install -r requirements.txt semgrep checkov certifi
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz" | tar -xz -C /usr/local/bin gitleaks
      - name: Validate and test rules
        run: |
          mkdir -p .claude/sast/results
          python3 .claude/skills/sast-scan/tools/test_rules.py \
            --rules-dir .claude/skills/sast-scan/rules/semgrep --test \
            --coverage-report .claude/sast/results/rule-coverage.json
      - name: Run SAST (rules layer)
        run: |
          python3 .claude/skills/sast-scan/tools/sast_runner.py \
            --target . --profile standard --format all --fail-on high
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: .claude/sast/results/merged.sarif
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-gate-results
          path: .claude/sast/results/
