# OpenSAST - GitHub Actions CI Template
# Copy this file to .github/workflows/sast.yml and customize as needed.

name: SAST

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  sast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
          # Install scanner tools as needed
          pip install semgrep || true
          pip install checkov || true

      - name: Install Gitleaks
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz
          tar -xzf gitleaks_8.21.2_linux_x64.tar.gz -C /usr/local/bin gitleaks
          rm gitleaks_8.21.2_linux_x64.tar.gz

      # --- Customize scan profile below ---
      # quick:    Pre-commit check (Semgrep + Gitleaks only)
      # standard: Regular scan (+ Checkov for IaC)
      # deep:     Full audit (+ CodeQL, requires CodeQL setup)

      - name: Run SAST scan
        run: |
          python3 .claude/skills/sast-scan/tools/sast_runner.py \
            --target . \
            --profile standard \
            --format all \
            --fail-on high

      - name: Upload SARIF to GitHub code scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: .claude/sast/results/merged.sarif

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-results
          path: .claude/sast/results/
          retention-days: 30
