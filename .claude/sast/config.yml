version: 1

default_profile: standard

targets:
  include:
    - src
    - app
    - packages
  exclude:
    - node_modules
    - vendor
    - dist
    - build
    - .git
    - .venv
    # Intentionally-vulnerable demo/sample data and rule fixtures: gating the
    # build on them is meaningless (they exist to exercise the scanner).
    - tests
    - examples
    - .claude/skills/sast-scan/examples
    - .claude/skills/sast-scan/rules

report:
  formats:
    - markdown
  output_dir: .claude/sast/results
