name: SAST

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  sast:
    runs-on: ubuntu-latest
    env:
      SEMGREP_SEND_METRICS: off
      SEMGREP_ENABLE_VERSION_CHECK: "0"
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml
          pip install semgrep
          pip install checkov

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Validate custom SAST rules
        run: |
          python3 .claude/skills/sast-scan/tools/test_rules.py \
            --rules-dir .claude/skills/sast-scan/rules/semgrep \
            --coverage-report .claude/sast/results/rule-coverage.json

      - name: Run Core Tests
        run: |
          pytest -q \
            tests/test_sast_runner.py \
            tests/test_codeql.py \
            tests/test_rules.py \
            tests/test_corpus.py

      - name: Run SAST scan
        run: |
          python3 .claude/skills/sast-scan/tools/sast_runner.py \
            --target . \
            --profile standard \
            --format all \
            --fail-on high

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: .claude/sast/results/merged.sarif

      - name: Upload scan artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-results
          path: .claude/sast/results/
          retention-days: 30
