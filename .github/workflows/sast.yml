name: SAST

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  sast:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
          pip install semgrep
          pip install checkov

      - name: Install Gitleaks
        run: |
          curl -sSfL https://raw.githubusercontent.com/gitleaks/gitleaks/master/install.sh | sh -s -- -b /usr/local/bin

      - name: Validate custom SAST rules
        run: |
          python3 .claude/skills/sast-scan/tools/test_rules.py \
            --rules-dir .claude/skills/sast-scan/rules/semgrep \
            --validate-only

      - name: Run SAST scan
        run: |
          python3 .claude/skills/sast-scan/tools/sast_runner.py \
            --target . \
            --profile standard \
            --format all \
            --fail-on high

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: .claude/sast/results/merged.sarif

      - name: Upload scan artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-results
          path: .claude/sast/results/
          retention-days: 30
